const SFX=(()=>{let ctx=null;const go=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx};function sweep(f1,f2,dur,vol,wave){vol=vol||.2;wave=wave||'sine';try{const c=go(),n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=wave;o.frequency.setValueAtTime(f1,n);o.frequency.exponentialRampToValueAtTime(f2,n+dur);g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(vol,n+.01);g.gain.exponentialRampToValueAtTime(.001,n+dur);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+dur+.05)}catch(e){}}function noise(dur,vol,freq){vol=vol||.15;freq=freq||800;try{const c=go(),n=c.currentTime,b=c.createBuffer(1,c.sampleRate*dur,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=c.createBufferSource(),fi=c.createBiquadFilter(),g=c.createGain();fi.type='bandpass';fi.frequency.value=freq;fi.Q.value=.5;g.gain.setValueAtTime(vol,n);g.gain.exponentialRampToValueAtTime(.001,n+dur);s.buffer=b;s.connect(fi);fi.connect(g);g.connect(c.destination);s.start(n);s.stop(n+dur)}catch(e){}}return{jump(){sweep(80,600,.35,.3,'sawtooth');noise(.5,.2,200);setTimeout(()=>sweep(600,2000,.4,.12,'sine'),150)},arrive(){sweep(1200,300,.4,.25,'sine');setTimeout(()=>noise(.12,.2,400),80)},fire(){noise(.07,.3,1400);sweep(400,200,.1,.15,'square')},buy(){sweep(440,660,.09,.12,'sine');setTimeout(()=>sweep(660,880,.08,.1,'sine'),70)},sell(){sweep(880,660,.08,.1,'sine');setTimeout(()=>sweep(660,440,.09,.12,'sine'),70)},click(){sweep(900,700,.04,.07,'square')},victory(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>sweep(f,f*1.5,.18,.1,'sine'),i*80))},upgrade(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>sweep(f,f*1.4,.15,.1,'sine'),i*70))}}})()
const SAVE_KEY='lr_v6'
const saveGame=s=>{try{localStorage.setItem(SAVE_KEY,JSON.stringify(s))}catch(e){}}
const loadGame=()=>{try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null}catch(e){return null}}
const wipeSave=()=>{try{localStorage.removeItem(SAVE_KEY)}catch(e){}}

// ── SYSTEMS ──
const SYSTEMS={
  portsmith:{id:'portsmith',name:'Portsmith Station',x:40,y:60,tier:1,locked:false,economy:'INDUSTRIAL',faction:'Combine',fuelCost:0,desc:"A grey orbital platform with the architectural ambition of a filing cabinet. Home to 40,000 people who have all decided they are here temporarily.",cheap:['components'],expensive:['food','ore'],connections:['haverlock','sump','bellhaven'],npcs:['grex','mara'],combatChance:0},
  haverlock:{id:'haverlock',name:'Haverlock Prime',x:18,y:38,tier:1,locked:false,economy:'AGRICULTURAL',faction:'Independent',fuelCost:55,desc:"A world of tremendous agricultural productivity and equally tremendous tedium. The population have channelled their creative energy into competitive jam-making.",cheap:['food'],expensive:['tech','components','luxury'],connections:['portsmith','meridian','new_geneva','bellhaven'],npcs:['becker'],combatChance:0},
  bellhaven:{id:'bellhaven',name:'Bellhaven',x:11,y:62,tier:1,locked:false,economy:'COLONIAL',faction:'Independent',fuelCost:50,desc:"A frontier colony that made the mistake of succeeding. The Combine sends inspectors, the inspectors send reports. The colonists have opinions about this.",cheap:['food','ore'],expensive:['tech','luxury','medical'],connections:['portsmith','haverlock','consortium'],npcs:['agatha'],combatChance:5},
  sump:{id:'sump',name:'The Sump',x:66,y:28,tier:1,locked:false,economy:'MINING',faction:'Independent',fuelCost:65,desc:"An asteroid the size of a small moon being systematically hollowed out since 2089. Structural integrity reports are classified because the inspector got lost inside.",cheap:['ore'],expensive:['food','medical','luxury'],connections:['portsmith','vantage','iron_drift'],npcs:['duchess','smee'],hasBlackMarket:true,combatChance:15},
  iron_drift:{id:'iron_drift',name:'Iron Drift',x:82,y:14,tier:1,locked:false,economy:'DEEP MINING',faction:'Independent',fuelCost:80,desc:"Three platforms bolted to an iron-nickel asteroid. The population of 8,000 regards sunlight as theoretical and fresh air as unnecessary.",cheap:['ore','components'],expensive:['food','luxury','medical'],connections:['sump','farside','kessel'],npcs:['okafor','kasey'],combatChance:20},
  meridian:{id:'meridian',name:'Meridian Cross',x:46,y:44,tier:2,locked:false,economy:'TRADE HUB',faction:'Neutral',fuelCost:75,desc:"Everyone passes through Meridian Cross. Nobody stays long. The economy is built around people who need a drink and a room for one night.",cheap:['luxury'],expensive:['ore','food'],connections:['portsmith','haverlock','new_cascadia','new_geneva'],npcs:['otto','old_nav'],combatChance:10},
  new_cascadia:{id:'new_cascadia',name:'New Cascadia',x:24,y:64,tier:2,locked:false,economy:'TECH HUB',faction:'Combine',fuelCost:85,desc:"The most prosperous system in the sector, a fact New Cascadians mention within thirty seconds, before asking about their craft distillery.",cheap:['tech','components'],expensive:['ore','food','medical'],connections:['haverlock','meridian','kessel','consortium'],npcs:['pellandra'],combatChance:0},
  consortium:{id:'consortium',name:'The Consortium',x:8,y:50,tier:2,locked:false,economy:'CORPORATE',faction:'Combine',fuelCost:90,desc:"The Consortium is what happens when a trading company is given judicial powers and told to be efficient. It runs on time. Nobody asks how.",cheap:['tech','components'],expensive:['food','contraband','ore'],connections:['bellhaven','new_cascadia'],npcs:['chen','mirela'],combatChance:0},
  new_geneva:{id:'new_geneva',name:'New Geneva',x:32,y:20,tier:2,locked:false,economy:'POLITICAL',faction:'Neutral',fuelCost:85,desc:"The sector's diplomatic hub. Every faction has an embassy and a face they wear inside it. The air is thick with politeness that means nobody trusts anyone.",cheap:['luxury','medical'],expensive:['ore','contraband'],connections:['haverlock','meridian','kessel','exodus'],npcs:['flyte','barker'],combatChance:0},
  ashmore:{id:'ashmore',name:'Ashmore Relay',x:74,y:58,tier:2,locked:true,unlockReq:{type:'credits',amount:2500,label:'Earn 2,500 credits total'},economy:'COMMUNICATIONS',faction:'Neutral',fuelCost:95,desc:"A communications relay station on the edge of Combine space. Everything broadcast in this sector passes through Ashmore. The engineer who maintains it knows more than is comfortable.",cheap:['components'],expensive:['luxury','contraband'],connections:['vantage','cold_harbor','the_wreck'],npcs:['sable'],combatChance:10},
  vantage:{id:'vantage',name:'Vantage Outpost',x:86,y:44,tier:2,locked:true,unlockReq:{type:'credits',amount:3000,label:'Earn 3,000 credits total'},economy:'MILITARY',faction:'Combine',fuelCost:100,desc:"A military station at the frontier of Combine space. The staff take their jobs extremely seriously and are suspicious of people who don't.",cheap:['components'],expensive:['food','contraband'],connections:['sump','meridian','ashmore'],npcs:['commander'],combatChance:20},
  kessel:{id:'kessel',name:'Kessel Expanse',x:54,y:12,tier:3,locked:true,unlockReq:{type:'flag',flag:'edda_clue_3',label:'Find all three clues about Edda'},economy:'FRONTIER',faction:'None',fuelCost:120,desc:"The last registered position of Edda Vance, seven years ago. The station keeper doesn't ask questions. The locals don't either.",cheap:['ore','contraband'],expensive:['tech','medical','luxury'],connections:['new_cascadia','new_geneva','iron_drift'],npcs:['isha'],combatChance:30},
  farside:{id:'farside',name:'Farside Station',x:92,y:24,tier:3,locked:true,unlockReq:{type:'flag',flag:'vantage_contact',label:'Make contact at Vantage Outpost'},economy:'DERELICT',faction:'None',fuelCost:115,desc:"A station that officially closed in 2058. It did not. The people here are not officially here. This arrangement suits everyone.",cheap:['ore','contraband'],expensive:['food','medical','tech'],connections:['iron_drift','vantage'],npcs:['ghost'],combatChance:35},
  the_wreck:{id:'the_wreck',name:'The Wreck',x:60,y:76,tier:3,locked:true,unlockReq:{type:'flag',flag:'edda_clue_2',label:"Follow Mara's trail"},economy:'FREEPORT',faction:'Frontier',fuelCost:110,desc:"A decommissioned colony ship that never finished decommissioning. Four thousand people call it home. None using their real names.",cheap:['contraband','ore'],expensive:['medical','tech'],connections:['ashmore','cold_harbor'],npcs:['rook','motes'],combatChance:30},
  cold_harbor:{id:'cold_harbor',name:'Cold Harbor',x:86,y:66,tier:3,locked:true,unlockReq:{type:'flag',flag:'vantage_contact',label:'Make contact at Vantage Outpost'},economy:'PIRATE HAVEN',faction:'Frontier',fuelCost:130,desc:"Lawless, dangerous, and refreshingly honest about both. Everyone here is very professional about things that are technically crimes.",cheap:['contraband','ore'],expensive:['medical','tech'],connections:['vantage','ashmore','the_wreck'],npcs:[],combatChance:40},
  exodus:{id:'exodus',name:'Exodus Point',x:18,y:10,tier:4,locked:true,unlockReq:{type:'flag',flag:'truth_revealed',label:'Uncover the truth about the Frontier Wars'},economy:'SANCTUARY',faction:'Frontier',fuelCost:150,desc:"The furthest point on any registered chart. Beyond here the maps say nothing, which is to say there is more than the maps would like you to know.",cheap:['contraband','ore'],expensive:['medical','luxury'],connections:['new_geneva','haverlock'],npcs:['edda'],combatChance:15},
}

// ── NPCS ──
const NPCS={
  grex:{id:'grex',name:'Grex',title:'Dock Master',portrait:'grex',greeting:"Name. Ship registration. Purpose of visit. In that order.",tree:{
    root:{text:"You bought the Persistent Delusion? From the Kelloway yard?\n\nPrevious owner: Edda Vance. She walked out of here seven years ago in a hurry. Owed me forty credits. I mention this not because I expect reimbursement, but because I want it on the record that I remember.",options:[
      {text:"Who was Edda Vance?",go:'edda'},{text:"What's worth trading here?",go:'trade'},{text:"That'll be all.",go:null}]},
    edda:{text:"Independent trader. Good reputation. She ran information: nav charts, data cores, for whoever paid. Careful. Very careful.\n\nThen she went quiet. Then she left the ship in impound and walked through that airlock. Never came back.",options:[
      {text:"Did she say where she was going?",go:'edda_where',flag:'edda_clue_1',flagLabel:'🔍 Clue 1: Grex remembers'},
      {text:"Who else knew her?",go:'edda_contacts'},{text:"Back to trading.",go:'trade'}]},
    edda_where:{text:"Last thing she said: 'Don't let them impound the ship.' Then she left.\n\nThe Combine asked about her three weeks later. Two agents. Very polished. I gave them nothing — Edda was thorough. They left a card. I filed it in the recycling unit.",options:[
      {text:"The Combine asked about her.",go:null},{text:"Who else might know?",go:'edda_contacts'}]},
    edda_contacts:{text:"Mara Solis — she's over there — they traded information sometimes. And there's an old navigator at Meridian Cross called Vasquez. If you're trying to find her — which I'd advise against — that's where I'd start.",options:[
      {text:"Why advise against it?",go:'warning'},{text:"Thanks, Grex.",go:null}]},
    warning:{text:"Because the Combine asked about her. The Combine does not ask casual questions.\n\nI am a simple man, {name}. I find it useful to notice when things are hidden and choose not to look.",options:[{text:"I appreciate the advice.",go:null}]},
    trade:{text:"Components are cheap here. Ore and food are scarce. Bellhaven does good food if you don't mind the inspection queue.",options:[{text:"Good to know.",go:null}]},
  }},
  mara:{id:'mara',name:'Mara Solis',title:'Independent Trader',portrait:'mara',greeting:"Oh! Sorry — I was watching the dock — nevermind. Can I help?",tree:{
    root:{text:"Haverlock's in a drought year. Anyone carrying food there makes about forty percent above standard.\n\nI'm not going — my customs relationship with Haverlock is complicated. Slightly off-spec grain. Last season.",options:[
      {text:"You knew Edda Vance?",go:'edda'},{text:"Other market tips?",go:'tips'},{text:"Thanks for the grain tip.",go:null}]},
    edda:{text:"We traded information. She was careful. Very careful.\n\nWhich is why I noticed when she stopped being careful.",options:[
      {text:"What do you mean?",go:'careless',flag:'edda_clue_2',flagLabel:"🔍 Clue 2: Mara's warning"},
      {text:"Do you know where she went?",go:'where'}]},
    careless:{text:"Six months before she disappeared, she started asking questions openly. About the Combine's licensing during the Frontier Wars.\n\nShe sent me a data core two weeks before she vanished. 'Keep it safe. Don't read it.' It's in a lockbox on The Sump — talk to someone called Smee. Tell him I sent you.",options:[
      {text:"I'll find Smee.",go:null},{text:"What was she looking for?",go:'looking'}]},
    looking:{text:"She didn't say. But she paid fifty credits for a fifteen-year-old shipping manifest. A week later, the Combine sent people asking the same questions.\n\nI told them: I just know about grain prices.",options:[{text:"The Combine again.",go:null}]},
    where:{text:"Kessel Expanse. She was obsessed with it. Something about pre-war navigation records. I don't know more than that.",options:[{text:"Understood.",go:null}]},
    tips:{text:"The Consortium buys components at premium — corporate projects. New Geneva pays well for medical. The Wreck takes anything at any price.",options:[{text:"Thanks.",go:null}]},
  }},
  duchess:{id:'duchess',name:'The Duchess',title:'Proprietor',portrait:'duchess',greeting:"You're not from here. I can tell because you look like you can see properly. What do you want?",tree:{
    root:{text:"I don't deal in contraband. I deal in goods whose legal status is subject to ongoing philosophical debate between myself and various law enforcement agencies.",options:[
      {text:"I'm looking for Smee.",go:'smee'},{text:"What's trading well here?",go:'trade'},{text:"Just browsing.",go:null}]},
    smee:{text:"Bay 7, lower docks. He's not well — cave-in last month. What do you want with Smee?",options:[
      {text:"Mara Solis sent me.",go:'mara_sent'},{text:"Just a message.",go:'vague'}]},
    mara_sent:{text:"Mara. Right. Bay 7. And if whatever you're collecting causes me problems, I'll be very irritated. I manage irritation by charging significantly above market rate.",options:[{text:"Understood.",go:null}]},
    vague:{text:"Bay 7. The Sump is small. 'Just a message' means I know the contents in twelve hours.",options:[{text:"Fair point.",go:null}]},
    trade:{text:"Ore cheap. Food and medical premium. Real money: Kessel pays triple for anything not on the manifest. The Wreck buys everything, no questions.",options:[{text:"Thanks.",go:null}]},
  }},
  smee:{id:'smee',name:'Smee',title:'Miner (Injured)',portrait:'smee',greeting:"...who are you? If you're from management, leave. If you're a doctor, also leave — I can't pay.",tree:{
    root:{text:"Not management. Fine. Go ahead.",options:[
      {text:"Mara Solis sent me.",go:'mara_sent'},{text:"How are you holding up?",go:'health'},{text:"Wrong bay, sorry.",go:null}]},
    mara_sent:{text:"Mara said someone might come.\n\n[Presses a data core into your hand]\n\nDon't open it on any Combine network. It's encrypted — Edda's own encryption. You'll need her key to read it. Last I heard, the key was somewhere in the Kessel Expanse.",options:[
      {text:"Thank you. This matters.",go:'thanks',flag:'edda_clue_3',flagLabel:'🔍 Clue 3: The data core',giveItem:'data_core'},
      {text:"What was Edda to you?",go:'relationship'}]},
    thanks:{text:"Just get it somewhere it matters. Edda thought what she found was worth disappearing for.\n\nI hope she was right.",options:[{text:"I'll find out.",go:null}]},
    relationship:{text:"Old friend. Same Belt colony. She got a ship. Got out. I got a very close personal relationship with a structural support beam.\n\nShe believed the truth mattered. I find that quality both admirable and operationally reckless.",options:[{text:"Take the data core. I'll find out.",go:'mara_sent'}]},
    health:{text:"Two ribs. One kneecap. The optimism was gone before the cave-in.\n\nGot medical supplies? I'll trade information.",options:[
      {text:"What kind of information?",go:'info'},{text:"No supplies right now.",go:null}]},
    info:{text:"Three jump routes not on any Combine chart. Which dock inspectors can be paid to look elsewhere. And: Iron Drift has a listening post that reports to Vantage. Foreman Okafor doesn't know. Everyone else does.",options:[{text:"I'll come back with supplies.",go:null}]},
  }},
  otto:{id:'otto',name:'Otto',title:'Barkeep, Meridian Cross',portrait:'otto',greeting:"Sit down. What are you drinking. That was not a question.",tree:{
    root:{text:"Everyone who comes through thinks they're passing through. Nobody is. Meridian Cross IS the destination — they just haven't admitted it yet.",options:[
      {text:"Information about Edda Vance.",go:'edda'},{text:"Who's the old man in the corner?",go:'vasquez'},
      {text:"Tell me about New Geneva.",go:'geneva'},{text:"Just the drink.",go:null}]},
    edda:{text:"She drank here. Tipped well. She was after old Combine cargo manifests — Frontier Wars era.\n\nI pointed her at Vasquez. He keeps records the way other people keep grudges: obsessively and with full emotional investment.",options:[
      {text:"Tell me about Vasquez.",go:'vasquez'},{text:"What was she looking for?",go:'specific'}]},
    specific:{text:"She wouldn't say. Paid fifty credits for a fifteen-year-old shipping manifest. A week later, two polished Combine agents sat exactly where you're sitting.\n\nI told them: I just pour the drinks.",options:[{text:"Tell me about Vasquez.",go:'vasquez'}]},
    vasquez:{text:"Former Combine navigator. Retired involuntarily — kept records of things they'd rather forget. Been here since, drinking steadily and annotating with increasingly hostile marginalia.\n\nHe'll talk if you feed him. Literally.",options:[{text:"I'll try that.",go:null}]},
    geneva:{text:"New Geneva is where people go to look important without doing anything. Ambassador Flyte is the one to talk to — she knows where every body is buried, figuratively and possibly literally.\n\nShe doesn't talk to traders. Find a reason she'd want to.",options:[{text:"Thanks.",go:null}]},
    trade:{text:"Meridian is the clearinghouse. Luxury goods sell well. We produce nothing except gossip, which I provide free of charge.",options:[{text:"Good to know.",go:null}]},
  }},
  old_nav:{id:'old_nav',name:'Vasquez',title:'Former Navigator',portrait:'old_nav',greeting:"...",tree:{
    root:{text:"...",options:[
      {text:"Otto says you might help. About Edda Vance.",go:'check_food'},{text:"Sorry — wrong person.",go:null}]},
    check_food:{text:"Otto talks too much.\n\n[Studies you]\n\n...do you have food? Real food. Not station rations.",options:[
      {text:"[Give 2 food] Here.",go:'with_food',requireCargo:'food',requireQty:2,costCargo:'food',costQty:2},
      {text:"No, sorry.",go:'no_food'}]},
    with_food:{text:"[Eats with complete dignity]\n\nEdda found an anomaly in Frontier Wars shipping records. Weapons-grade components shipped to Frontier Faction stations through Combine intermediaries. During the period the Combine claimed to be neutral.\n\nThey didn't just profit from the war. They armed both sides.",options:[
      {text:"Is there proof?",go:'proof'},{text:"That would explain everything.",go:'conclusion'}]},
    proof:{text:"She was looking for source records at the Kessel Expanse archive — originals, stored before the Combine shut it down.\n\nIf those records still exist, they're enough to collapse the Combine's legitimacy entirely. Which is why Edda disappeared.",options:[
      {text:"I have her data core. Going to Kessel.",go:'resolve'},{text:"Where exactly?",go:'location'}]},
    location:{text:"Navigation archive, coordinates 7-7-Alpha. Declared decommissioned in 2054. The keeper, a woman named Isha, was still running it ten years ago.",options:[{text:"Thank you.",go:null}]},
    conclusion:{text:"It explains why they wanted her gone. Why they kept asking. And why, seven years later, it's still dangerous enough that they haven't stopped looking.",options:[{text:"I'm going to Kessel.",go:'resolve'}]},
    resolve:{text:"[Nods slowly]\n\nBraver than I am. Or considerably more foolish.\n\nKessel archive. Keeper named Isha. If she trusts you, she'll have Edda's key.\n\nGood luck.",options:[{text:"Thank you.",go:null}]},
    no_food:{text:"...[Turns away]\n\nCome back when you have something worth talking over.",options:[{text:"I will.",go:null}]},
  }},
  becker:{id:'becker',name:'Old Becker',title:'Farmer-Trader',portrait:'becker',greeting:"You're a trader? Perfect. I need forty crates off my hands before the inspector arrives.",tree:{
    root:{text:"Drought year, but I hoarded last season's grain. Inspector calls it manipulation. I call it forward planning.\n\nFood cheap from me. Very expensive at Portsmith and The Sump.",options:[
      {text:"What do you need in return?",go:'needs'},{text:"Other tips?",go:'tips'},{text:"I'll buy some food.",go:null}]},
    needs:{text:"Tech components. My harvesting equipment is held together with ingenuity and strong language, and both are wearing thin.",options:[{text:"I'll see what I can do.",go:null}]},
    tips:{text:"New Cascadia pays premium for organics. 'Reconnecting with nature' — expensive food and talking about it at dinner parties.\n\nAlso: the Consortium pays absurd rates for medical. Something going on inside there.",options:[{text:"Thanks.",go:null}]},
  }},
  agatha:{id:'agatha',name:'Agatha Sorn',title:'Retired Administrator',portrait:'agatha',greeting:"Sit down. I'll put the kettle on. The kettle's broken but the gesture matters.",tree:{
    root:{text:"Thirty-one years in the Combine's administrative division. Do you know what that means? I know where the files are.\n\nNot the public files. The other ones.",options:[
      {text:"What files?",go:'files'},{text:"What brings you out here?",go:'why'},{text:"What's worth trading from Bellhaven?",go:'trade'}]},
    files:{text:"The Frontier Wars authorisation records. There's a filing system for logistics that shouldn't exist if the Combine was neutral. I didn't understand what I was looking at until much later.\n\nA trader came through asking the same questions, about four years after the war. I told her what I'd seen. She had a name — Edda Vance.",options:[
      {text:"I'm looking for Edda too.",go:'edda'},{text:"What did you tell her?",go:'told'}]},
    edda:{text:"Then you're asking the right questions. She was going after the source records at Kessel. Whether she got there — I don't know. She was careful.\n\nI'll tell you what I told her: the Consortium was the logistics arm. Secondary records, if they exist, are in Consortium archives. Talk to a woman called Mirela Voss. Tell her Agatha says 7741-C.",options:[{text:"7741-C. Thank you.",go:null}]},
    told:{text:"That the weapons requisitions were authorised through a Consortium subsidiary. Filed under a supply contract number nobody was likely to look up.\n\nWhich is how bureaucracy works. Things aren't hidden. They're just misfiled.",options:[{text:"Thank you.",go:null}]},
    why:{text:"Retirement. Fresh air. A garden I am systematically killing due to forty years of indoor living.\n\nAlso, Bellhaven is the only colony the Combine hasn't fully assimilated yet. It's nice to be somewhere things aren't entirely decided.",options:[{text:"Fair enough.",go:null}]},
    trade:{text:"Food and ore in abundance. What we lack: everything else. Tech, medical, luxury — bring anything manufactured and colonists will pay generously.",options:[{text:"Good to know.",go:null}]},
  }},
  okafor:{id:'okafor',name:'Foreman Okafor',title:'Shift Foreman, Iron Drift',portrait:'okafor',greeting:"You're not here to work, which means you want something. Go ahead.",tree:{
    root:{text:"Iron Drift runs on ore and pragmatism. We dig, we smelt, we ship. We don't ask where it goes, they don't ask how we get it out.",options:[
      {text:"Trade opportunities?",go:'trade'},{text:"What's at Farside Station?",go:'farside'},{text:"Tell me about the listening post.",go:'listen'}]},
    trade:{text:"Ore, obviously. Processed components. We're critically short on medical — three workers on restricted duty because we've got no analgesics.\n\nBring medical supplies and I'll pay above market. That's not negotiation, that's fact.",options:[{text:"I'll see what I can do.",go:null}]},
    farside:{text:"Officially closed. Unofficially — none of my business. The people who stop there occasionally buy ore. They pay cash and don't want receipts. I find this professionally adequate.\n\nDon't tell Vantage I said that.",options:[{text:"Said what?",go:null}]},
    listen:{text:"[Long pause]\n\n...where did you hear that?\n\nThere's equipment in section 7 I was told to classify as 'geological survey instruments.' It transmits. I don't know to where. I don't ask. The people who installed it had Combine credentials.\n\nI have 8,000 workers. I make pragmatic decisions.",options:[
      {text:"Doesn't that bother you?",go:'bother'},{text:"I understand.",go:null}]},
    bother:{text:"[Quietly]\n\nEvery single day. But Iron Drift needs the licensing. And licensing comes from the Combine.\n\nNow. Did you want to buy some ore?",options:[{text:"Yes. I did.",go:null}]},
  }},
  kasey:{id:'kasey',name:'Kasey',title:'Miner, Iron Drift',portrait:'kasey',greeting:"Oh hey! You're a trader? Actual trader? From outside?",tree:{
    root:{text:"Sorry, it's just — I've been on-station for eleven months. The most exciting thing was a drill bit shattering. Nobody was hurt but it was genuinely exciting.\n\nDo you have any news? From anywhere?",options:[
      {text:"Where would you like to start?",go:'news'},{text:"Tell me about The Wreck.",go:'wreck'},{text:"Any tips for a trader?",go:'trade'}]},
    news:{text:"[Listens with complete intensity]\n\nThat's incredible. All of it.\n\nOkay — The Wreck is three days out by the back route. Rook runs the trading floor. Tell her Kasey says hello — she'll add a ten percent premium. We have an arrangement.",options:[{text:"What kind of arrangement?",go:'arrangement'}]},
    arrangement:{text:"I find her buyers. She gives me a cut. Eleven months on Iron Drift, you get creative about income streams.\n\nAlso she's great. Absolute menace at cards. Play cards with her — it's a fantastic experience.",options:[{text:"I'll pass on the cards.",go:null}]},
    wreck:{text:"Technically a decommissioned colony ship. Technically. It's been there so long it has its own culture, currency, and apparently very good noodles.\n\nThey operate outside Combine jurisdiction because technically nobody is there, technically. Everyone finds this arrangement satisfactory.",options:[{text:"Good to know.",go:null}]},
    trade:{text:"Ore always flowing. Contraband makes best margins if you know Farside. For safe profits: medical supplies in, ore and components out. Very reliable. Very boring. I say that with love.",options:[{text:"Thanks.",go:null}]},
  }},
  chen:{id:'chen',name:'Director Chen',title:'Regional Director, The Consortium',portrait:'chen',greeting:"Welcome. The Consortium is always pleased to facilitate legitimate commerce.",tree:{
    root:{text:"The Consortium provides infrastructure, licensing, logistics oversight, and dispute resolution.\n\nWe are, in short, the reason commerce functions. You're welcome.",options:[
      {text:"What's the Consortium's role in the Frontier Wars?",go:'wars'},{text:"What work is available?",go:'work'},{text:"What's worth trading here?",go:'trade'}]},
    wars:{text:"[Smile doesn't shift]\n\nThe Consortium provided logistical coordination to both humanitarian and commercial operations during that difficult period.\n\nIs there something specific you're looking for?",options:[
      {text:"Weapons contracts. Manifests. 2051 to 2053.",go:'manifests'},{text:"Never mind.",go:null}]},
    manifests:{text:"[Pause of exactly two seconds]\n\nI'm not sure I understand the question. If you have concerns about historical procurement, the Combine's oversight committee is the appropriate channel.\n\nI'd strongly suggest that channel.",options:[
      {text:"That sounds like a threat.",go:'threat'},{text:"Of course. Thank you.",go:null}]},
    threat:{text:"It sounds like helpful administrative guidance. The Consortium is always helpful.\n\nSafe travels, Captain. We'll be watching.",options:[{text:"I'll bet you will.",go:null}]},
    work:{text:"Standard cargo contracts. Tech output to inner systems. Competitive rates, reliable payment, no complications.\n\nAssuming you keep your questions similarly uncomplicated.",options:[{text:"Understood.",go:null}]},
    trade:{text:"Technology and components are our primary exports. We buy raw materials and food. Standard rates. The Consortium doesn't negotiate.",options:[{text:"I'll check the market.",go:null}]},
  }},
  mirela:{id:'mirela',name:'Mirela Voss',title:'Consortium Archivist',portrait:'mirela',greeting:"I'm — sorry, I can't really talk here. Are you — did someone send you?",tree:{
    root:{text:"If Agatha sent you, say the number.",options:[
      {text:"7741-C.",go:'agatha_sent'},{text:"Nobody sent me.",go:'no_send'}]},
    agatha_sent:{text:"[Exhales]\n\nOkay. Good. I've been here twelve years and I've been looking for a reason to leave for eleven of them.\n\nI can get you the secondary manifests — the ones showing the Consortium's actual role in 2051 to 2053. Not the filed versions. The real ones. But I need something first.",options:[
      {text:"Name it.",go:'needs'},{text:"How do you know I can be trusted?",go:'trust'}]},
    needs:{text:"Medical supplies. For me. I have a condition the Consortium's health plan doesn't cover because they classified it as 'preexisting.'\n\nBring me a six-month supply and I'll copy the 7741-C files. You'll understand everything.",options:[
      {text:"[Deliver medical supplies]",go:'delivered',requireCargo:'medical',requireQty:3,costCargo:'medical',costQty:3,flag:'consortium_files',flagLabel:'📁 Consortium records obtained'},
      {text:"I'll get back to you.",go:null}]},
    delivered:{text:"[Takes the supplies]\n\nThank you. You have no idea.\n\n[Presses a data chip into your hand]\n\nThe 7741-C files. Every weapons contract, every shipping manifest, every authorisation signature. The Consortium was the mechanism. The Combine was the author. It's all there.\n\nI'll be on the next ship to Bellhaven. Don't come back here.",options:[{text:"Good luck.",go:null}]},
    trust:{text:"You don't. And I don't know if I can trust you. But I've been sitting on these files for three years and nobody came looking.\n\nYou came looking. That's enough.",options:[{text:"What do you need?",go:'needs'}]},
    no_send:{text:"I'm sorry — wrong person.\n\n[Turns away, clearly disappointed]",options:[{text:"Wait — Agatha sent me.",go:'agatha_sent'},{text:"No problem.",go:null}]},
  }},
  flyte:{id:'flyte',name:'Ambassador Flyte',title:'Senior Diplomat, New Geneva',portrait:'flyte',greeting:"A trader. How refreshing. We mostly get politicians. At least you're honest about what you want.",tree:{
    root:{text:"New Geneva exists because everyone needs somewhere to pretend to cooperate. I've been facilitating this pretense for twenty-three years.\n\nWhat brings an independent trader to the diplomatic quarter?",options:[
      {text:"I'm investigating the Frontier Wars.",go:'wars'},{text:"What's the trade situation?",go:'trade'},{text:"Tell me about the political landscape.",go:'politics'}]},
    wars:{text:"[Sets down her glass very precisely]\n\nThe official position: they arose from resource competition and factional tensions.\n\nThe unofficial position — which I hold in my personal capacity, meaning I'll deny this conversation — is that they were arranged. I have no proof. I have, however, been a diplomat for twenty-three years, and arranged things have a particular texture.",options:[
      {text:"I'm gathering proof. Edda Vance.",go:'edda'},{text:"Who would benefit?",go:'benefit'}]},
    edda:{text:"Vance came through here four years ago. Very thorough. I told her about a Consortium subsidiary called Threshold Logistics — she didn't know. Threshold was dissolved in 2054. Records went to Consortium secure archive, Level Seven. Mirela Voss is the archivist.\n\nAlso: talk to Barker Ness. He's a journalist. He knows what to do with what you find.",options:[{text:"Thank you, Ambassador.",go:null}]},
    benefit:{text:"Who benefits from twelve years of jump gate fee revenue? Who now controls every transit point in the sector?\n\nI leave that as an exercise for the reader.",options:[{text:"The Combine.",go:null}]},
    politics:{text:"The Combine controls the infrastructure. The independents control the resentment. The Frontier Faction controls the parts of space nobody else wants — which turns out to be strategically significant.\n\nNew Geneva controls the conversation about all of this. We consider it a fair trade.",options:[{text:"What's your actual position?",go:null}]},
    trade:{text:"Medical and luxury goods sell well here — diplomats maintain standards. We export very little. The primary commodity in New Geneva is information, and that doesn't fit on your cargo manifest.",options:[{text:"Understood.",go:null}]},
  }},
  barker:{id:'barker',name:'Barker Ness',title:'Journalist',portrait:'barker',greeting:"You've got the look of someone who knows something. Sit down.",tree:{
    root:{text:"Barker Ness. Independent journalist, currently banned from six Combine-controlled systems, which I consider a professional achievement.\n\nI've been writing about the Frontier Wars for four years. I have a lot of pieces. I'm missing the centre.",options:[
      {text:"What are you missing?",go:'missing'},{text:"What do you know?",go:'knows'},{text:"I might have what you need.",go:'have'}]},
    missing:{text:"Authenticated source documents. Combine records from 2051 to 2053. I have testimonies, manifests, two former Combine employees on background.\n\nNone of it publishable without primary documents. They can say it's fabricated.",options:[
      {text:"I'm working on getting those.",go:'working'},{text:"What happens when you publish?",go:'publish'}]},
    working:{text:"Then we should keep in touch.\n\nIf you get authenticated records — especially anything with Combine executive signatures — bring them here first. Don't give them to any official body.\n\nGive them to me. I'll make sure they can't be buried.",options:[{text:"How do I know you'll actually publish?",go:'trust'}]},
    trust:{text:"Because I'm banned from six systems and I'm still here. If I were going to drop it, I'd have stopped three years and two death threats ago.\n\nAlso I'm a journalist. Constitutionally incapable of sitting on a good story.",options:[{text:"Fair enough.",go:null}]},
    knows:{text:"The Combine licensed both sides' weapons procurement through Threshold Logistics. Subsidiary dissolved immediately after the war. Records transferred to Combine-controlled archives.\n\nI know a former navigator at Meridian Cross with the routing data. An archivist at the Consortium with financial records. I just can't get anyone on the record.",options:[{text:"I've talked to both of them.",go:'impressed'}]},
    impressed:{text:"[Long pause]\n\nThen you're further along than I am. What are you planning to do with what you find?",options:[
      {text:"Bring it to you.",go:'bring'},{text:"Still working that out.",go:null}]},
    bring:{text:"Good. That's the right answer.\n\nIf you get the Kessel records and Consortium files, bring them here. I can verify, authenticate, and publish within forty-eight hours. Once it's published, the Combine can't unring that bell.",options:[{text:"I'll be back.",go:null}]},
    have:{text:"[Leans forward]\n\nTell me.",options:[{text:"Not yet. Still gathering.",go:null},{text:"I have consortium files.",go:'knows'}]},
    publish:{text:"[Quietly]\n\nEverything changes. Jump gate fees get challenged. Combine legitimacy gets challenged. Frontier Faction gets vindicated. Thirteen years of treaties built on a lie have to be renegotiated.\n\nIt'll be a very loud few years. Worth it.",options:[{text:"Good.",go:null}]},
  }},
  pellandra:{id:'pellandra',name:'Commissioner Pellandra',title:'Combine Trade Officer',portrait:'pellandra',greeting:"Your ship is unusual. Is it registered? I'll need to see your papers.",tree:{
    root:{text:"The Persistent Delusion. Previously registered to one Edda Vance. Outstanding administrative queries against that registration.",options:[
      {text:"What kind of queries?",go:'queries'},{text:"She's been gone seven years.",go:'gone'},{text:"Any legitimate work?",go:'work'}]},
    queries:{text:"Administrative. As I said.\n\n[Long pause]\n\nYou might do well to stick to established routes. Traders who operate in stable, monitored lanes tend to have very long and uneventful careers.",options:[
      {text:"That sounds like a suggestion.",go:'suggestion'},{text:"I appreciate the advice.",go:null}]},
    suggestion:{text:"A friendly one. The Combine is not an adversary to independent traders — we're a framework. Frameworks are comfortable. Comfortable is preferable to the alternative.",options:[{text:"Understood.",go:null}]},
    gone:{text:"[Smiles slightly]\n\nPaperwork doesn't disappear because people do. Our memory is very long.\n\nSomething to keep in mind.",options:[{text:"I'll remember that.",go:null}]},
    work:{text:"Cargo runs. Standard rates. Nothing complicated. If complicated things appeal to you, I'd suggest they appeal less.",options:[{text:"I'll pass.",go:null}]},
  }},
  commander:{id:'commander',name:'Commander Yells',title:'Station Commander, Vantage',portrait:'commander',greeting:"State your business. Quickly.",tree:{
    root:{text:"An independent trader at a military outpost. Very confident or very lost.",options:[
      {text:"Trading. Looking for opportunities.",go:'trade'},
      {text:"I've heard about Cold Harbor.",go:'cold_harbor',flag:'vantage_contact',flagLabel:'⚠️ Vantage contact made'},
      {text:"Just passing through.",go:null}]},
    trade:{text:"We take ore and components. Standard rate. Contraband on the manifest — I'd know before you landed.",options:[
      {text:"Noted.",go:null},
      {text:"What do you know about Cold Harbor?",go:'cold_harbor',flag:'vantage_contact',flagLabel:'⚠️ Vantage contact made'}]},
    cold_harbor:{text:"Cold Harbor is beyond our jurisdiction. It exists because it's not worth the ships to clear it out. If you're going — don't mention Vantage.\n\nThat's all I'll say.",options:[{text:"Fair enough.",go:null}]},
  }},
  sable:{id:'sable',name:'Sable',title:'Relay Engineer, Ashmore',portrait:'sable',greeting:"You're not scheduled. Nothing from this direction is scheduled. How did you get the approach vector?",tree:{
    root:{text:"Ashmore Relay is supposed to be automated. I'm supposed to be maintenance. What I actually am is the only person who knows that everything transmitted in this sector passes through my equipment.",options:[
      {text:"I'm a trader. Looking for a port.",go:'trader'},{text:"What do you hear on those transmissions?",go:'transmissions'},{text:"Anything to trade?",go:'trade'}]},
    transmissions:{text:"[Long pause]\n\nI'm not supposed to answer that. But the encryption on certain traffic has a signature I recognise — Combine Executive level. And some of it is recent. It includes a ship name I've now heard twice.\n\nPersistent Delusion.",options:[
      {text:"They know I'm here.",go:'known'},{text:"What are they saying?",go:'content'}]},
    known:{text:"They know you exist. The content is encrypted above my clearance, but the routing is clear — going to Combine Central, not any regional office.\n\nWhatever you're doing, it's attracting attention at the top.",options:[{text:"Good to know.",go:null}]},
    content:{text:"I can't decrypt it. But traffic spiked when you entered the sector, and again when you visited New Geneva. There's a standing watch on any traffic mentioning Edda Vance.\n\nSomeone senior is tracking this personally.",options:[{text:"Thank you for telling me.",go:'why_tell'}]},
    why_tell:{text:"Because I've been sitting on this relay for six years and I'd like to think I still have capacity for choosing whose side I'm on.\n\nAlso I'm deeply bored. Don't discount that.",options:[{text:"Fair enough.",go:null}]},
    trader:{text:"There's a market. Modest. Mostly Vantage supply runs.\n\nIf you want a quiet port that nobody is actively monitoring — which might be useful — Ashmore is about as quiet as it gets.",options:[{text:"That's exactly what I needed.",go:null}]},
    trade:{text:"Components in quantity — everything that runs the relay. Food and medical I'd pay above rate for. It's just me out here.\n\nI'd also trade information. I have a lot of it.",options:[{text:"Tell me about the transmissions.",go:'transmissions'}]},
  }},
  ghost:{id:'ghost',name:'Ghost',title:'Information Broker, Farside',portrait:'ghost',greeting:"I was told to expect you. I wasn't told by whom. That's usually how it works.",tree:{
    root:{text:"Farside has no official population. I am therefore not here and you are not speaking to me. This conversation cannot be logged because it isn't happening.\n\nWhat can the absence of information do for your absence here?",options:[
      {text:"I'm looking for Edda Vance.",go:'edda'},{text:"What can you tell me about the Combine?",go:'combine'},{text:"What's trading here?",go:'trade'}]},
    edda:{text:"Vance. Yes. She used Farside as a waypoint seven years ago. Left a message — not for me, but I read it anyway; professional instinct.\n\nThe message said: 'If anyone comes looking, tell them Cold Harbor. Tell them ask for no one. They'll know what that means.'",options:[
      {text:"Ask for no one.",go:'no_one'},{text:"She was heading to Cold Harbor?",go:'cold_harbor'}]},
    no_one:{text:"Yes. Cold Harbor. There's a contact there who goes by no name. Operates through intermediaries. Has done so since the war.\n\nEdda trusted this contact completely. That's notable because Edda didn't trust anyone completely.",options:[{text:"Thank you.",go:null}]},
    cold_harbor:{text:"That was the destination. Cold Harbor is the only place in this sector the Combine hasn't put eyes on. Which makes it the only place she could actually be safe.",options:[{text:"Then that's where I'm going.",go:null}]},
    combine:{text:"The Combine has listening posts at Iron Drift and two other locations I won't specify. Standing surveillance on fourteen independent traders, including you, as of three weeks ago.\n\nThey're watching Kessel Expanse very carefully. Someone went there recently and they noticed.",options:[{text:"That was probably me.",go:null}]},
    trade:{text:"Farside trades in things that don't officially exist. If that's your market, everything's available at a premium.\n\nConventionally: ore and not much else.",options:[{text:"I'll look at the market.",go:null}]},
  }},
  rook:{id:'rook',name:'Rook',title:'Trading Floor, The Wreck',portrait:'rook',greeting:"Come in! Sit down! What have you got and what do you want for it?",tree:{
    root:{text:"The Wreck doesn't discriminate on origin, legality, or provenance. We buy things. We sell things. Very few questions.\n\nKasey sends people sometimes. If you know Kasey, ten percent on the buy rate.",options:[
      {text:"Kasey says hello.",go:'kasey_friend'},{text:"What are you buying?",go:'buying'},{text:"What do you know about Cold Harbor?",go:'cold_harbor'}]},
    kasey_friend:{text:"Excellent person. Eleven months on Iron Drift and still finding ways to be useful. Respect that enormously.\n\nTen percent on anything you sell me today. I keep my word — competitive advantage in this business.",options:[{text:"What are you buying?",go:'buying'}]},
    buying:{text:"Everything. Honestly, everything. Contraband, ore, components, luxury, tech, medical — four thousand people who need all of it.\n\nWe pay above standard on medical right now. Short on the good stuff.",options:[{text:"I can work with that.",go:null}]},
    cold_harbor:{text:"Cold Harbor is the serious one. The Wreck is functional lawlessness. Cold Harbor is principled lawlessness. There's a distinction.\n\nThere's a contact there — nobody's ever seen them directly. Handles significant things. If you're going for a reason, say you're looking for an old ship. They'll know what you mean.",options:[{text:"An old ship.",go:null}]},
  }},
  motes:{id:'motes',name:'Captain Motes',title:'Retired Privateer',portrait:'motes',greeting:"You're new. Don't get used to it — The Wreck changes people. Usually for the better.",tree:{
    root:{text:"I ran a privateer operation for fifteen years. Then the Frontier Wars ended and I didn't need to run anymore. Now I live on a decommissioned colony ship and I grow herbs. The universe is strange.",options:[
      {text:"Privateer for whom?",go:'privateer'},{text:"What do you know about the Frontier Wars?",go:'wars'},{text:"Advice for a trader?",go:'advice'}]},
    privateer:{text:"For whoever paid. Frontier Faction, mostly. Weapon interdiction — we stopped Combine supply convoys. Or tried to.\n\nThe trouble was they had more convoys than anyone expected. The resupply lines made no tactical sense unless you were shipping to both sides.",options:[
      {text:"The Combine was supplying the Frontier Faction?",go:'supplying'},{text:"Did you ever meet Edda Vance?",go:'edda'}]},
    supplying:{text:"I didn't figure it out until after. Seven years of thinking about it.\n\nThey were supplying us with enough to keep us going. Not enough to win. Every time we got close to a decisive engagement, we'd be suddenly short on something critical. And the Combine would offer a 'humanitarian' ceasefire.\n\nThe war lasted thirteen years because they needed it to.",options:[{text:"To justify the jump gate licensing.",go:null}]},
    edda:{text:"Once. She came to The Wreck about eight years ago. Asked me everything I just told you.\n\nShe had a theory. I had a story. We traded. She went to Kessel. I heard nothing after — until rumours started that she'd found something, that the Combine was looking, that she was alive and hiding.\n\nI hoped she made it.",options:[{text:"I think she did.",go:null}]},
    wars:{text:"I ran interdiction for the Frontier Faction during the hot years. What I saw never added up until much later: we were always just barely losing. Like something was calibrating us.",options:[{text:"Tell me more.",go:'supplying'}]},
    advice:{text:"Don't be predictable. Vary your routes. Combine surveillance has patterns and those patterns have gaps.\n\nAlso: The Wreck pays above market on almost everything.",options:[{text:"Good advice.",go:null}]},
  }},
  isha:{id:'isha',name:'Keeper Isha',title:'Archive Keeper, Kessel',portrait:'isha',greeting:"We're not open. We're never open. How did you get here?",tree:{
    root:{text:"The archive is officially decommissioned. Has been for twenty years. I keep it running because the records are important and someone has to.\n\nWho sent you?",options:[
      {text:"Nobody. I'm following Edda Vance's trail.",go:'edda',requireFlag:'edda_clue_3'},
      {text:"I'm just a trader.",go:'just_trader'}]},
    edda:{text:"...\n\n[A long silence]\n\nEdda is alive. I shouldn't tell you that. I'm telling you anyway because you're here, which means you've been thorough.\n\nShe left her decryption key with me. Said someone would come. Said they'd know about the data core.\n\nDo you have it?",options:[
      {text:"[Show data core] Yes.",go:'has_core',requireFlag:'has_data_core',flag:'decryption_complete',flagLabel:'🔓 Data core decrypted'},
      {text:"I'm still trying to get it.",go:'no_core'}]},
    has_core:{text:"[Inserts the key]\n\nThe data core opens.\n\nCombine shipping manifests, 2051 to 2053. Weapons components, both sides. Authenticated, timestamped, unforgeable.\n\nThe Combine manufactured the Frontier Wars. Fifteen years of conflict to justify claiming control of every jump gate in the sector. The proof has been sitting here, waiting.\n\nEdda is at Cold Harbor. She's been waiting too.",options:[
      {text:"I need to get to Cold Harbor.",go:null,flag:'truth_revealed',flagLabel:'📡 The truth is known'}]},
    no_core:{text:"Not done yet. The core is somewhere in The Sump — Edda left it with a contact there.\n\nI'll be here. The archive will be here. We've been here for twenty years. A little longer won't matter.",options:[{text:"I'll be back.",go:null}]},
    just_trader:{text:"Then you're in the wrong system. The Kessel Expanse hasn't been on established trade routes for twenty years.\n\nLeave the same way you came.",options:[{text:"I'll do that.",go:null}]},
  }},
  edda:{id:'edda',name:'Edda Vance',title:'The Reason You Are Here',portrait:'edda',greeting:"...you found me. I wasn't sure anyone would.",tree:{
    root:{text:"Seven years. Seven years hiding at the end of the sector, in a place the Combine can't reach, waiting for the proof to find its way to someone who could use it.\n\nAnd here you are. With my ship.",options:[
      {text:"Here I am. With your ship.",go:'ship'},{text:"What happens now?",go:'now'},{text:"Are you all right?",go:'alright'}]},
    ship:{text:"[Small smile]\n\nI sold it on purpose. The forwarding address was specific to a type: someone thorough enough to trace it back.\n\nI needed someone who would ask questions. Not someone I chose — someone who chose themselves, by being the kind of person who asks questions about a ship with a history.\n\nYou were the right person.",options:[{text:"What happens now?",go:'now'}]},
    now:{text:"That depends on what you have. If you have the data core, and the Consortium files, and Barker Ness at New Geneva — it happens now. We transmit everything simultaneously to every independent news outlet in the sector.\n\nThe Combine can't silence them all. Enough will get through.\n\nAfter that — it gets complicated. But complicated is better than buried.",options:[
      {text:"[Transmit everything]",go:'publish',requireFlag:'consortium_files'},
      {text:"I still need the Consortium files.",go:'files_needed'}]},
    publish:{text:"[You transmit everything — data core, Consortium manifests, Vasquez's testimony, Motes' account, all of it — simultaneously, to thirty-two outlets across the sector]\n\nEdda watches the transmission queue run down.\n\n'Thirteen years,' she says. 'Thirteen years of war, and then seven years of silence. That's over now.'\n\nShe looks out at the stars for a long moment.\n\n'Thank you. Take the ship back. You've earned it.'\n\nOutside, the sector has just become considerably louder.",options:[
      {text:"The Long Route. Complete.",go:null,flag:'game_complete',flagLabel:'✨ The Long Route — Completed'}]},
    files_needed:{text:"Get the Consortium files. Talk to Mirela Voss at the Consortium archive — mention Agatha Sorn, mention 7741-C. She's been waiting.\n\nCome back when you have them. I've waited seven years. A little longer is fine.",options:[{text:"I'll be back.",go:null}]},
    alright:{text:"[Considers this seriously]\n\nYes. Surprisingly. Hiding is not a comfortable life, but it's a life, and there are worse things than being alive and invisible while you wait for the world to catch up.\n\nI got very good at cards. The people here don't ask questions.\n\nAnd now you're here, which means the waiting is over. What do you have?",options:[{text:"Everything. Let's finish this.",go:'now'}]},
  }},
}

  {id:'patrol',name:'Combine Patrol Cutter',maxHull:65,damage:18,credits:0,pattern:['scan','attack','attack','defend','attack'],
    intro:"A Combine cutter locks on. 'Persistent Delusion, heave to for inspection.' Your manifest is not entirely clean."},
  {id:'hunter',name:'Unmarked Hunter',maxHull:85,damage:22,credits:300,pattern:['attack','charge','heavy_attack','evade','attack'],

  {id:'wing',name:'Pirate Wing',maxHull:55,damage:16,credits:220,pattern:['attack','attack','evade','attack','attack'],

  {id:'combine_frigate',name:'Combine Frigate',maxHull:120,damage:24,credits:0,pattern:['scan','scan','attack','defend','attack','attack','heavy_attack'],
    intro:"A full Combine frigate. This is not a customs check. This is a warship and it has you in its targeting solution."},
  {id:'frontier_raider',name:'Frontier Raider',maxHull:70,damage:19,credits:250,pattern:['attack','charge','evade','heavy_attack','attack'],
    intro:"A Frontier Faction raider — old war hardware, well maintained. The pilot knows what they're doing. Clear immediately."},
]

const EVENTS=[

    {text:"Navigate carefully (risk 10 hull)",type:'hull',value:-10,msg:"You pick through the debris. Your shields take the difference."},

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════

function rng(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min }

function generateMarket(systemId) {
  const sys = SYSTEMS[systemId]
  const market = {}
  COMMODITIES.forEach(c => {
    let price = c.base
    if (sys.cheap?.includes(c.id)) price = Math.floor(price * 0.65)
    else if (sys.expensive?.includes(c.id)) price = Math.floor(price * 1.45)
    price = Math.floor(price * (0.9 + Math.random() * 0.2))
    market[c.id] = { price, qty: rng(5, 20) }
  })
  return market
}

function travelCost(systemId, engineLevel) {
  const base = SYSTEMS[systemId].fuelCost
  const mult = engineLevel === 0 ? 1 : engineLevel === 1 ? 0.75 : 0.5
  return Math.floor(base * mult)
}

function cargoUsed(cargo) { return cargo.reduce((t, c) => t + c.qty, 0) }

function playerFireDamage(weaponsLevel) { return rng(8, 14) + weaponsLevel * 10 }

function playerRepairAmount(shieldsLevel) { return 15 + shieldsLevel * 5 }

function getEnemyAction(enemy, patternIdx) {
  const pattern = enemy.pattern
  const action = pattern[patternIdx % pattern.length]
  const nextAction = pattern[(patternIdx + 1) % pattern.length]
  return { current: action, next: nextAction }
}

function formatIntent(action, damage) {
  const map = { attack: `⚔️ Attack (~${damage} dmg)`, evade: '🛡 Evade (half dmg)', defend: '🛡 Defend (half dmg)', charge: '⚡ Charging...', heavy_attack: `💥 HEAVY (~${damage * 1.8 | 0} dmg)`, scan: '📡 Scan manifest' }
  return map[action] || action
}

// ═══════════════════════════════════════════════════════════
// STATE & REDUCER
// ═══════════════════════════════════════════════════════════

function makeInitialState() {
  const markets = {}
  Object.keys(SYSTEMS).forEach(id => { markets[id] = generateMarket(id) })
  return {
    view: 'nameEntry',
    playerName: '', credits: 500, hull: 100, maxHull: 100,
    cargo: [], cargoMax: 20,
    weapons: 0, shields: 0, engine: 0,
    upgrades: [],
    flags: {},
    trades: [], totalProfit: 0, totalLoss: 0, creditsEarned: 0,
    currentSystem: 'portsmith', visitedSystems: ['portsmith'],
    markets, npcSeen: {},
    stationTab: 'market',
    dialogue: null,
    combat: null, combatLog: [],
    event: null,
    gameLog: ['You have inherited a ship with a name you didn\'t choose and a history you don\'t know. The Persistent Delusion. It\'ll do.'],
    notification: null,
  }
}

function reducer(state, action) {
  switch (action.type) {

    case 'SET_NAME': return { ...state, playerName: action.name, view: 'map' }

    case 'SET_TAB': return { ...state, stationTab: action.tab }

    case 'NOTIFY': return { ...state, notification: action.msg }
    case 'CLEAR_NOTIFY': return { ...state, notification: null }

    case 'GOTO_MAP': return { ...state, view: 'map', dialogue: null }
    case 'GOTO_STATION': return { ...state, view: 'station', stationTab: action.tab || 'dock' }
    case 'GOTO_LOG': return { ...state, view: 'log' }
    case 'GOTO_LEDGER': return { ...state, view: 'ledger' }

    case 'START_TRAVEL': {
      const sys = SYSTEMS[action.to]
      const cost = travelCost(action.to, state.engine)
      if (state.credits < cost) return { ...state, notification: `Not enough credits for fuel (need ${cost})` }
      const combatRoll = Math.random() * 100
      let event = null, combat = null
      if (combatRoll < sys.combatChance) {
        const enemyTypes = ENEMIES.filter(e => sys.faction === 'Combine' ? e.id === 'patrol' : e.id !== 'patrol')
        const eType = enemyTypes[rng(0, enemyTypes.length - 1)]
        const enemy = { ...eType, hull: eType.maxHull, patternIdx: 0 }
        combat = { enemy, playerAP: 3, playerEvading: false, charged: false, turn: 1, log: [eType.intro] }
      } else {
        const eventPool = EVENTS
        event = eventPool[rng(0, eventPool.length - 1)]
      }
      const newMarkets = { ...state.markets, [action.to]: generateMarket(action.to) }
      const visited = state.visitedSystems.includes(action.to) ? state.visitedSystems : [...state.visitedSystems, action.to]
      const log = [`Jumped to ${sys.name}. Fuel cost: ${cost} credits.`, ...state.gameLog].slice(0, 60)
      return {
        ...state, credits: state.credits - cost,
        currentSystem: action.to, visitedSystems: visited,
        markets: newMarkets,
        view: combat ? 'combat' : event ? 'event' : 'station',
        stationTab: 'dock',
        combat: combat || null, event: event || null, combatLog: combat ? [combat.log[0]] : [],
        gameLog: log,
      }
    }

    case 'RESOLVE_EVENT': {
      const opt = action.option
      let newState = { ...state, event: null, view: 'station', stationTab: 'dock' }
      const addLog = (msg) => { newState.gameLog = [msg, ...newState.gameLog].slice(0, 60) }
      if (opt.type === 'hull') { newState.hull = Math.max(1, state.hull + opt.value); addLog(opt.msg) }
      else if (opt.type === 'credits') { newState.credits = Math.max(0, state.credits + opt.value); addLog(opt.msg) }
      else if (opt.type === 'gamble') {
        if (Math.random() > 0.45) {
          if (opt.win.credits) newState.credits += opt.win.credits
          if (opt.win.hull) newState.hull = Math.min(state.maxHull, state.hull + opt.win.hull)
          addLog(opt.win.msg)
        } else {
          if (opt.lose.credits) newState.credits = Math.max(0, state.credits + (opt.lose.credits || 0))
          if (opt.lose.hull) newState.hull = Math.max(1, state.hull + (opt.lose.hull || 0))
          addLog(opt.lose.msg)
        }
      }
      else if (opt.type === 'flag') { newState.flags = { ...state.flags, [opt.flag]: true }; addLog(opt.msg) }
      else if (opt.type === 'pay_repair') { newState.credits = Math.max(0, state.credits - opt.value); addLog(opt.msg) }
      else if (opt.type === 'info_trade') {
        const cargoItem = state.cargo.find(c => c.id === opt.need)
        if (cargoItem && cargoItem.qty >= opt.qty) {
          const newCargo = state.cargo.map(c => c.id === opt.need ? { ...c, qty: c.qty - opt.qty } : c).filter(c => c.qty > 0)
          newState.cargo = newCargo; addLog(opt.msg)
        } else { addLog("You don't have enough food to trade.") }
      }
      else if (opt.type === 'give_cargo') {
        const ci = state.cargo.find(c => c.id === opt.id)
        if (!ci || ci.qty < opt.qty) { return {...newState, notification:`Need ${opt.qty}x ${opt.id}.`, event:state.event, view:state.view} }
        newState.cargo = state.cargo.map(c=>c.id===opt.id?{...c,qty:c.qty-opt.qty}:c).filter(c=>c.qty>0); addLog(opt.msg)
      }
      else if (opt.type === 'add_cargo') {
        const used = newState.cargo.reduce((t,c)=>t+c.qty,0)
        if (used + opt.qty > newState.cargoMax) { return {...newState, notification:'Not enough cargo space.', event:state.event, view:state.view} }
        const comm = COMMODITIES.find(c=>c.id===opt.id)||{name:opt.id,color:'#808080'}
        const existing = newState.cargo.find(c=>c.id===opt.id)
        newState.cargo = existing ? newState.cargo.map(c=>c.id===opt.id?{...c,qty:c.qty+opt.qty}:c) : [...newState.cargo,{id:opt.id,name:comm.name,qty:opt.qty,buyPrice:0,color:comm.color}]
        addLog(opt.msg)
      }
      else { addLog(opt.msg || "You continue on your way.") }
      return newState
    }

    case 'BUY': {
      const market = state.markets[state.currentSystem]
      const item = market[action.id]
      const comm = COMMODITIES.find(c => c.id === action.id)
      const qty = action.qty
      const cost = item.price * qty
      if (state.credits < cost) return { ...state, notification: 'Not enough credits.' }
      if (cargoUsed(state.cargo) + qty > state.cargoMax) return { ...state, notification: 'Not enough cargo space.' }
      const existing = state.cargo.find(c => c.id === action.id)
      const newCargo = existing
        ? state.cargo.map(c => c.id === action.id ? { ...c, qty: c.qty + qty } : c)
        : [...state.cargo, { id: action.id, name: comm.name, qty, buyPrice: item.price, color: comm.color }]
      const newMarket = { ...market, [action.id]: { ...item, qty: item.qty - qty } }
      const log = [`Bought ${qty}x ${comm.name} for ${cost} cr at ${item.price}cr/unit.`, ...state.gameLog].slice(0, 60)
      const bTrade={type:'buy',id:action.id,name:comm.name,color:comm.color,qty,price:item.price,total:cost,system:SYSTEMS[state.currentSystem].name}
      return { ...state, credits: state.credits - cost, cargo: newCargo, markets: { ...state.markets, [state.currentSystem]: newMarket }, gameLog: log, trades:[bTrade,...(state.trades||[])].slice(0,100) }
    }

    case 'SELL': {
      const market = state.markets[state.currentSystem]
      const item = market[action.id]
      const comm = COMMODITIES.find(c => c.id === action.id)
      const cargoItem = state.cargo.find(c => c.id === action.id)
      if (!cargoItem) return state
      const qty = action.qty
      const revenue = item.price * qty
      const profit = (item.price - cargoItem.buyPrice) * qty
      const newCargo = state.cargo.map(c => c.id === action.id ? { ...c, qty: c.qty - qty } : c).filter(c => c.qty > 0)
      const newMarket = { ...market, [action.id]: { ...item, qty: item.qty + qty } }
      const profitStr = profit >= 0 ? `+${profit}` : `${profit}`
      const log = [`Sold ${qty}x ${comm.name} for ${revenue} cr (${profitStr} profit).`, ...state.gameLog].slice(0, 60)
      const earned = state.creditsEarned + Math.max(0, profit)
      const sTrade={type:'sell',id:action.id,name:comm.name,color:comm.color,qty,price:item.price,buyPrice:ci.buyPrice,profitPerUnit:item.price-ci.buyPrice,total:revenue,profit,system:SYSTEMS[state.currentSystem].name}
      const nTP=(state.totalProfit||0)+(profit>0?profit:0),nTL=(state.totalLoss||0)+(profit<0?-profit:0)
      return { ...state, credits: state.credits + revenue, cargo: newCargo, markets: { ...state.markets, [state.currentSystem]: newMarket }, gameLog: log, creditsEarned: earned, trades:[sTrade,...(state.trades||[])].slice(0,100), totalProfit:nTP, totalLoss:nTL }
    }

    case 'REPAIR': {
      const amt = action.amt
      const cost = amt * 5
      if (state.credits < cost) return { ...state, notification: 'Not enough credits.' }
      if (state.hull >= state.maxHull) return { ...state, notification: 'Hull is already at maximum.' }
      const newHull = Math.min(state.maxHull, state.hull + amt)
      const log = [`Repaired ${newHull - state.hull} hull points for ${cost} credits.`, ...state.gameLog].slice(0, 60)
      return { ...state, credits: state.credits - cost, hull: newHull, gameLog: log }
    }

    case 'BUY_UPGRADE': {
      const upg = UPGRADES.find(u => u.id === action.id)
      if (!upg) return state
      if (state.credits < upg.cost) return { ...state, notification: 'Not enough credits.' }
      if (upg.req && !state.upgrades.includes(upg.req)) return { ...state, notification: 'Prerequisite upgrade required.' }
      if (state.upgrades.includes(upg.id)) return { ...state, notification: 'Already installed.' }
      let ns = { ...state, credits: state.credits - upg.cost, upgrades: [...state.upgrades, upg.id] }
      if (upg.effect === 'cargo') ns = { ...ns, cargoMax: ns.cargoMax + upg.value }
      else if (upg.effect === 'engine') ns = { ...ns, engine: ns.engine + upg.value }
      else if (upg.effect === 'weapons') ns = { ...ns, weapons: ns.weapons + upg.value }
      else if (upg.effect === 'shields') ns = { ...ns, shields: ns.shields + upg.value }
      else if (upg.effect === 'hull') ns = { ...ns, maxHull: ns.maxHull + upg.value, hull: Math.min(ns.hull + upg.value, ns.maxHull + upg.value) }
      const log = [`Installed: ${upg.name}.`, ...state.gameLog].slice(0, 60)
      return { ...ns, gameLog: log }
    }

    case 'START_DIALOGUE': {
      return { ...state, view: 'dialogue', dialogue: { npcId: action.npcId, nodeId: 'root' }, npcSeen: { ...state.npcSeen, [action.npcId]: true } }
    }

    case 'CHOOSE_OPTION': {
      const opt = action.option
      if (!opt) return { ...state, view: 'station', dialogue: null }
      // Check cargo requirement
      if (opt.requireCargo) {
        const c = state.cargo.find(x => x.id === opt.requireCargo)
        if (!c || c.qty < opt.requireQty) return { ...state, notification: `You need ${opt.requireQty} ${opt.requireCargo} for this.` }
      }
      let ns = { ...state }
      // Deduct cargo cost
      if (opt.costCargo) {
        ns.cargo = ns.cargo.map(c => c.id === opt.costCargo ? { ...c, qty: c.qty - opt.costQty } : c).filter(c => c.qty > 0)
      }
      // Set flag
      if (opt.flag) {
        ns.flags = { ...ns.flags, [opt.flag]: true }
        const log = [opt.flagLabel || `Discovery: ${opt.flag}`, ...ns.gameLog].slice(0, 60)
        ns = { ...ns, gameLog: log }
      }
      // Give item
      if (opt.giveItem === 'data_core') {
        ns.flags = { ...ns.flags, has_data_core: true }
        ns.gameLog = ["[You receive Edda's encrypted data core. It's surprisingly light for something this important.]", ...ns.gameLog].slice(0, 60)
      }
      if (!opt.go) return { ...ns, view: 'station', dialogue: null }
      return { ...ns, dialogue: { npcId: ns.dialogue.npcId, nodeId: opt.go } }
    }

    case 'COMBAT_ACTION': {
      if (!state.combat) return state
      const { enemy, playerAP, playerEvading, charged, turn } = state.combat
      let newCombat = { ...state.combat }
      let newCombatLog = [...state.combatLog]
      let newHull = state.hull
      let notif = null

      const { current: enemyAct, next: enemyNext } = getEnemyAction(enemy, enemy.patternIdx)

      if (action.act === 'fire') {
        if (newCombat.playerAP < 1) { notif = 'Not enough AP.'; return { ...state, notification: notif } }
        const dmg = playerFireDamage(state.weapons)
        const actualDmg = enemyAct === 'evade' || enemyAct === 'defend' ? Math.floor(dmg * 0.5) : dmg
        newCombat.enemy = { ...newCombat.enemy, hull: Math.max(0, newCombat.enemy.hull - actualDmg) }
        newCombat.playerAP -= 1
        newCombatLog = [`Your fire: ${actualDmg} damage${(enemyAct === 'evade' || enemyAct === 'defend') ? ' (evaded!)' : ''}.`, ...newCombatLog]
      } else if (action.act === 'overload') {
        if (newCombat.playerAP < 2) { notif = 'Need 2 AP for overload.'; return { ...state, notification: notif } }
        const dmg = playerFireDamage(state.weapons) * 2
        const actualDmg = enemyAct === 'evade' || enemyAct === 'defend' ? Math.floor(dmg * 0.5) : dmg
        newCombat.enemy = { ...newCombat.enemy, hull: Math.max(0, newCombat.enemy.hull - actualDmg) }
        newCombat.playerAP -= 2
        newCombatLog = [`OVERLOAD: ${actualDmg} damage${(enemyAct === 'evade' || enemyAct === 'defend') ? ' (evaded!)' : ''}!`, ...newCombatLog]
      } else if (action.act === 'evade') {
        if (newCombat.playerAP < 1) { notif = 'Not enough AP.'; return { ...state, notification: notif } }
        newCombat.playerEvading = true
        newCombat.playerAP -= 1
        newCombatLog = [`Evasive manoeuvre: half damage this turn.`, ...newCombatLog]
      } else if (action.act === 'repair') {
        if (newCombat.playerAP < 2) { notif = 'Need 2 AP for repairs.'; return { ...state, notification: notif } }
        const repAmt = playerRepairAmount(state.shields)
        newHull = Math.min(state.maxHull, state.hull + repAmt)
        newCombat.playerAP -= 2
        newCombatLog = [`Emergency repair: +${repAmt} hull.`, ...newCombatLog]
      } else if (action.act === 'end_turn') {
        // Enemy acts
        const dmgBase = enemy.damage + (state.shields > 0 ? -state.shields * 3 : 0)
        let incomingDmg = 0
        if (enemyAct === 'attack') {
          incomingDmg = Math.max(2, dmgBase + rng(-3, 5))
          if (newCombat.playerEvading) incomingDmg = Math.floor(incomingDmg * 0.5)
          newHull = Math.max(0, state.hull + (newHull - state.hull) - incomingDmg)
          if (newHull < 0) newHull = 0
          // Actually recalculate from state.hull
          const baseHull = newHull === state.hull ? state.hull : newHull
          newHull = Math.max(0, newHull - incomingDmg)
          newCombatLog = [`${enemy.name} attacks: ${incomingDmg} damage${newCombat.playerEvading ? ' (you evaded: half)' : ''}.`, ...newCombatLog]
        } else if (enemyAct === 'heavy_attack') {
          incomingDmg = Math.max(2, Math.floor(dmgBase * 1.8) + rng(-3, 5))
          if (newCombat.playerEvading) incomingDmg = Math.floor(incomingDmg * 0.5)
          newHull = Math.max(0, state.hull + (newHull - state.hull) - incomingDmg)
          newCombatLog = [`${enemy.name} HEAVY STRIKE: ${incomingDmg} damage!`, ...newCombatLog]
        } else if (enemyAct === 'scan') {
          newCombatLog = [`${enemy.name} scans your manifest. Thinks about this. Attacks anyway.`, ...newCombatLog]
        } else {
          newCombatLog = [`${enemy.name} ${enemyAct}s. No damage.`, ...newCombatLog]
        }
        // Advance pattern
        newCombat.enemy = { ...newCombat.enemy, patternIdx: newCombat.enemy.patternIdx + 1 }
        newCombat.playerAP = 3
        newCombat.playerEvading = false
        newCombat.turn = newCombat.turn + 1
      }

      // Check end conditions
      if (newCombat.enemy.hull <= 0) {
        const reward = enemy.credits
        const log = reward > 0
          ? [`Victory! ${enemy.name} disabled. Salvage: ${reward} credits.`, ...state.gameLog].slice(0, 60)
          : [`${enemy.name} stands down. No salvage.`, ...state.gameLog].slice(0, 60)
        return { ...state, combat: null, combatLog: [], hull: action.act === 'end_turn' ? Math.max(0, newHull) : state.hull, credits: state.credits + reward, view: 'station', stationTab: 'dock', gameLog: log }
      }

      const finalHull = action.act === 'end_turn' ? Math.max(0, newHull) : action.act === 'repair' ? newHull : state.hull
      if (finalHull <= 0) {
        // Lose cargo, reduced hull
        const log = [`The ${enemy.name} overwhelms you. Emergency landing. Hull critical. You lose your cargo.`, ...state.gameLog].slice(0, 60)
        return { ...state, combat: null, combatLog: [], hull: 10, cargo: [], view: 'station', stationTab: 'dock', gameLog: log, notification: 'SHIP CRITICAL — All cargo lost. Pay for repairs immediately.' }
      }

      return { ...state, hull: finalHull, combat: newCombat, combatLog: newCombatLog.slice(0, 8) }
    }

    default: return state
  }
}

function Portrait({ id, size = 72 }) {
  const d = portraitData[id] || portraitData.grex
  const s = size
  const cx = s / 2
  const isGaunt = d.expression === 'gaunt'
  const isJolly = d.expression === 'jolly'
  const isTired = d.expression === 'tired'
  const isSharp = d.expression === 'sharp'
  const isUnknown = d.expression === 'unknown'
  const isMenacing = d.expression === 'menacing'
  const isKind = d.expression === 'kind'
  const isKnowing = d.expression === 'knowing'

  const faceW = isGaunt ? s * 0.38 : isJolly ? s * 0.47 : isSharp ? s * 0.36 : s * 0.42
  const faceH = isGaunt ? s * 0.54 : isJolly ? s * 0.45 : s * 0.5
  const faceY = s * 0.28

  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{ display: 'block', borderRadius: 4, border: '1px solid #2a3a4a' }}>
      {/* Background */}
      <rect width={s} height={s} fill={d.bg} />
      {/* Hair/head back */}
      <ellipse cx={cx} cy={faceY - 2} rx={faceW + 3} ry={isGaunt ? 9 : 10} fill={d.hair} />
      {/* Face */}
      <ellipse cx={cx} cy={faceY + faceH * 0.38} rx={faceW} ry={faceH * 0.54} fill={d.face} />
      {/* Eyes */}
      {isUnknown ? (
        <>
          <rect x={cx - faceW * 0.55} y={faceY + faceH * 0.08} width={faceW * 0.5} height={7} rx={2} fill="#303030" />
          <rect x={cx + faceW * 0.08} y={faceY + faceH * 0.08} width={faceW * 0.5} height={7} rx={2} fill="#303030" />
          <circle cx={cx - faceW * 0.3} cy={faceY + faceH * 0.13} r={2.5} fill={d.eyeColor} />
          <circle cx={cx + faceW * 0.32} cy={faceY + faceH * 0.13} r={2.5} fill={d.eyeColor} />
        </>
      ) : (
        <>
          <ellipse cx={cx - faceW * 0.32} cy={faceY + faceH * 0.15} rx={faceW * 0.2} ry={isTired ? 3.5 : isJolly ? 5 : 4.5} fill="white" />
          <ellipse cx={cx + faceW * 0.32} cy={faceY + faceH * 0.15} rx={faceW * 0.2} ry={isTired ? 3.5 : isJolly ? 5 : 4.5} fill="white" />
          <circle cx={cx - faceW * 0.32} cy={faceY + faceH * 0.16} r={faceW * 0.12} fill={d.eyeColor} />
          <circle cx={cx + faceW * 0.32} cy={faceY + faceH * 0.16} r={faceW * 0.12} fill={d.eyeColor} />
          {/* Pupils */}
          <circle cx={cx - faceW * 0.31} cy={faceY + faceH * 0.17} r={faceW * 0.06} fill="#050505" />
          <circle cx={cx + faceW * 0.32} cy={faceY + faceH * 0.17} r={faceW * 0.06} fill="#050505" />
          {/* Heavy brow for stern */}
          {d.expression === 'stern' && <>
            <rect x={cx - faceW * 0.52} y={faceY + faceH * 0.06} width={faceW * 0.42} height={4} rx={2} fill={d.hair} />
            <rect x={cx + faceW * 0.12} y={faceY + faceH * 0.06} width={faceW * 0.42} height={4} rx={2} fill={d.hair} />
          </>}
          {isTired && <>
            <line x1={cx - faceW * 0.52} y1={faceY + faceH * 0.1} x2={cx - faceW * 0.12} y2={faceY + faceH * 0.06} stroke={d.hair} strokeWidth={3} strokeLinecap="round" />
            <line x1={cx + faceW * 0.12} y1={faceY + faceH * 0.06} x2={cx + faceW * 0.52} y2={faceY + faceH * 0.1} stroke={d.hair} strokeWidth={3} strokeLinecap="round" />
          </>}
        </>
      )}
      {/* Nose */}
      <ellipse cx={cx} cy={faceY + faceH * 0.38} rx={faceW * 0.1} ry={faceW * 0.08} fill={d.face} stroke={d.hair} strokeWidth={0.8} strokeOpacity={0.4} />
      {/* Mouth */}
      {isJolly ? <path d={`M ${cx - faceW * 0.35} ${faceY + faceH * 0.62} Q ${cx} ${faceY + faceH * 0.75} ${cx + faceW * 0.35} ${faceY + faceH * 0.62}`} stroke={d.hair} strokeWidth={2.5} fill="none" strokeLinecap="round" />
      : isMenacing ? <path d={`M ${cx - faceW * 0.3} ${faceY + faceH * 0.68} Q ${cx} ${faceY + faceH * 0.58} ${cx + faceW * 0.3} ${faceY + faceH * 0.68}`} stroke={d.hair} strokeWidth={2} fill="none" strokeLinecap="round" />
      : d.expression === 'amused' ? <path d={`M ${cx - faceW * 0.2} ${faceY + faceH * 0.65} Q ${cx + faceW * 0.15} ${faceY + faceH * 0.72} ${cx + faceW * 0.32} ${faceY + faceH * 0.60}`} stroke={d.hair} strokeWidth={2} fill="none" strokeLinecap="round" />
      : isKnowing ? <path d={`M ${cx - faceW * 0.22} ${faceY + faceH * 0.64} Q ${cx} ${faceY + faceH * 0.70} ${cx + faceW * 0.28} ${faceY + faceH * 0.62}`} stroke={d.hair} strokeWidth={2} fill="none" strokeLinecap="round" />
      : <line x1={cx - faceW * 0.25} y1={faceY + faceH * 0.65} x2={cx + faceW * 0.25} y2={faceY + faceH * 0.65} stroke={d.hair} strokeWidth={2} strokeLinecap="round" />}
      {/* Otto mustache */}
      {isJolly && <path d={`M ${cx - faceW * 0.4} ${faceY + faceH * 0.52} C ${cx - faceW * 0.2} ${faceY + faceH * 0.57} ${cx} ${faceY + faceH * 0.5} ${cx} ${faceY + faceH * 0.5} C ${cx} ${faceY + faceH * 0.5} ${cx + faceW * 0.2} ${faceY + faceH * 0.57} ${cx + faceW * 0.4} ${faceY + faceH * 0.52}`} stroke={d.hair} strokeWidth={3} fill="none" />}
      {/* Scar for pirate */}
      {isMenacing && <line x1={cx - faceW * 0.1} y1={faceY + faceH * 0.05} x2={cx - faceW * 0.4} y2={faceY + faceH * 0.45} stroke="#601010" strokeWidth={2} strokeOpacity={0.7} />}
      {/* Visor for patrol */}
      {id === 'patrol' && <rect x={cx - faceW * 0.55} y={faceY + faceH * 0.05} width={faceW * 1.1} height={faceH * 0.25} rx={3} fill="#203040" opacity={0.85} />}
      {/* Bottom shadow */}
      <ellipse cx={cx} cy={s - 6} rx={faceW * 0.7} ry={6} fill={d.hair} opacity={0.5} />
    </svg>
  )
}

function HUD({ state, dispatch }) {

  return (
    <div style={{ background: '#050d14', borderBottom: '1px solid #1a3a5a', padding: '8px 12px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap', fontSize: 12, fontFamily: 'Space Mono, monospace', position: 'sticky', top: 0, zIndex: 100 }}>

      </span>
      <span style={{ color: '#7090a0' }}>│</span>
      <span style={{ color: '#708090' }}>CARGO <span style={{ color: used >= state.cargoMax ? '#f87171' : '#a0b0c0' }}>{used}/{state.cargoMax}</span></span>

        )}
      </div>
    </div>
  )
}
