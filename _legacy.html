// ── HYPERSPACE OVERLAY ────────────────────────────────────
function HyperspaceOverlay({phase,destination}){
  const canvasRef=useRef(null),animRef=useRef(null)
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return
    canvas.width=window.innerWidth;canvas.height=window.innerHeight
    const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,cx=W/2,cy=H/2
    const stars=Array.from({length:160},()=>({angle:Math.random()*Math.PI*2,speed:.3+Math.random()*.7,dist:.03+Math.random()*.12,len:0,hue:200+Math.random()*50,bright:70+Math.random()*30}))
    let t=0
    const draw=()=>{
      t++
      const prog=Math.min(t/80,1)
      ctx.fillStyle=phase==='arrive'?'rgba(1,10,20,0.22)':'rgba(1,10,20,0.16)'
      ctx.fillRect(0,0,W,H)
      const spd=phase==='arrive'?(1-prog)*.1+.002:prog*.14+.003
      stars.forEach(s=>{
        s.len+=spd*s.speed*55
        const r0=s.dist*Math.min(W,H)*.5,r1=r0+s.len*Math.min(W,H)*.45
        const x0=cx+Math.cos(s.angle)*r0,y0=cy+Math.sin(s.angle)*r0
        const x1=cx+Math.cos(s.angle)*r1,y1=cy+Math.sin(s.angle)*r1
        const grd=ctx.createLinearGradient(x0,y0,x1,y1)
        const alpha=phase==='arrive'?(1-prog)*(.3+s.speed*.5):prog*(.4+s.speed*.5)
        grd.addColorStop(0,'rgba(0,0,0,0)')
        grd.addColorStop(1,`hsla(${s.hue},80%,${s.bright}%,${alpha})`)
        ctx.strokeStyle=grd;ctx.lineWidth=phase==='arrive'?1.2:Math.min(2.5,s.len*1.5+.4)
        ctx.globalAlpha=1;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke()
      })
      const gA=phase==='arrive'?(1-prog)*.5:prog*.35
      const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*.28)
      glow.addColorStop(0,`rgba(80,180,255,${gA*1.2})`)
      glow.addColorStop(.5,`rgba(30,80,200,${gA*.4})`)
      glow.addColorStop(1,'rgba(0,0,0,0)')
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cy,Math.min(W,H)*.35,0,Math.PI*2);ctx.fill()
      ctx.globalAlpha=1
      animRef.current=requestAnimationFrame(draw)
    }
    draw()
    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current)}
  },[phase])
  const sys=SYSTEMS[destination]
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>
      <div style={{position:'relative',textAlign:'center',animation:'fadeIn .4s ease',fontFamily:"'Space Mono',monospace"}}>
        {phase==='jump'&&<><div style={{color:'#2a5a8a',fontSize:10,letterSpacing:6,marginBottom:16}}>ENTERING HYPERSPACE</div>
        <div style={{color:'#80d0ff',fontSize:20,letterSpacing:4,textShadow:'0 0 30px #4aafe0,0 0 60px #4aafe0'}}>{sys?.name}</div>
        <div style={{color:'#2a5a8a',fontSize:10,marginTop:12,letterSpacing:3}}>ROUTE LOCKED</div></>}
        {phase==='arrive'&&<><div style={{color:'#2a6a4a',fontSize:10,letterSpacing:6,marginBottom:16}}>ARRIVAL CONFIRMED</div>
        <div style={{color:'#80ffc0',fontSize:20,letterSpacing:4,textShadow:'0 0 30px #40d080,0 0 60px #40d080'}}>{sys?.name}</div>
        <div style={{color:'#2a6a4a',fontSize:10,marginTop:12,letterSpacing:3}}>{sys?.economy}</div></>}
      </div>
    </div>
  )
}

// ── GALAXY MAP ─────────────────────────────────────────────
function GalaxyMap({state,dispatch}){
  const [hovered,setHovered]=useState(null)
  const [jumping,setJumping]=useState(null)
  const [phase,setPhase]=useState('jump')
  const pending=useRef(null)
  const cur=state.currentSystem

  const handleJump=sysId=>{
    if(!sysId||sysId===cur||jumping)return
    SFX.jump()
    setJumping(sysId);setPhase('jump');pending.current=sysId
    setTimeout(()=>{setPhase('arrive');SFX.arrive()},1400)
    setTimeout(()=>{setJumping(null);dispatch({type:'START_TRAVEL',to:pending.current})},2500)
  }

  const conns=[]
  Object.values(SYSTEMS).forEach(s=>s.connections.forEach(c=>{
    const key=[s.id,c].sort().join('-')
    if(!conns.find(x=>x.key===key))conns.push({key,a:s.id,b:c})
  }))

  const canUnlock=s=>{
    if(!s.locked)return true;const r=s.unlockReq;if(!r)return false
    if(r.type==='credits')return state.creditsEarned>=r.amount||state.credits>=r.amount
    if(r.type==='flag')return!!state.flags[r.flag];return false
  }
  const canGo=id=>{
    if(!SYSTEMS[cur].connections.includes(id))return false
    const t=SYSTEMS[id];if(t.locked&&!canUnlock(t))return false
    return state.credits>=travelCost(id,state.engine)
  }

  const W2=460,H2=300,PAD=8
  const sx=id=>(SYSTEMS[id].x/100)*(W2-PAD*2)+PAD
  const sy=id=>(SYSTEMS[id].y/100)*(H2-PAD*2)+PAD

  const tierCol={1:'#2a5a90',2:'#4a8040',3:'#904040',4:'#806020'}

  return(
    <div style={{padding:'10px 14px',fontFamily:"'Space Mono',monospace",maxWidth:520,margin:'0 auto'}}>
      {jumping&&<HyperspaceOverlay phase={phase} destination={jumping}/>}
      <div style={{color:'#304050',fontSize:10,letterSpacing:3,marginBottom:8}}>NAVIGATION CHART — {Object.keys(SYSTEMS).length} SYSTEMS CHARTED</div>
      <div style={{background:'#030a12',border:'1px solid #1a3040',borderRadius:8,overflow:'hidden',marginBottom:12}}>
        <svg width="100%" viewBox={`0 0 ${W2} ${H2}`} style={{display:'block'}}>
          {Array.from({length:70},(_,i)=>(
            <circle key={i} cx={(i*63+17)%W2} cy={(i*89+31)%H2} r={i%6===0?1.3:.6} fill="#a0c0d0" opacity={(i%5+2)*.04}/>
          ))}
          {conns.map(({key,a,b})=>{
            const acc=canGo(b)||canGo(a)||cur===a||cur===b
            return<line key={key} x1={sx(a)} y1={sy(a)} x2={sx(b)} y2={sy(b)}
              stroke={acc?'#1a4060':'#0a1820'} strokeWidth={acc?1:.7} strokeDasharray={acc?undefined:'4,4'} opacity={acc?.8:.5}/>
          })}
          {Object.values(SYSTEMS).map(s=>{
            const x=sx(s.id),y=sy(s.id)
            const isCur=s.id===cur,cg=canGo(s.id),ul=canUnlock(s),hov=hovered===s.id
            const col=isCur?'#4aaad0':cg?(tierCol[s.tier]||'#606060'):'#1a2a3a'
            const cost=s.id!==cur?travelCost(s.id,state.engine):0
            const r=isCur?8:s.locked&&!ul?4:5
            return(
              <g key={s.id} style={{cursor:cg&&s.id!==cur?'pointer':'default'}}
                onClick={()=>cg&&s.id!==cur&&!jumping&&handleJump(s.id)}
                onMouseEnter={()=>setHovered(s.id)} onMouseLeave={()=>setHovered(null)}>
                {isCur&&<circle cx={x} cy={y} r={20} fill="none" stroke="#4aaad0" strokeWidth={.7} opacity={.25}/>}
                {cg&&!isCur&&<circle cx={x} cy={y} r={15} fill="none" stroke={col} strokeWidth={.5} opacity={.4}/>}
                <circle cx={x} cy={y} r={r}
                  fill={s.locked&&!ul?'#080f18':isCur?'#4aaad0':cg?col:'#111a28'}
                  stroke={isCur?'#a0e0ff':hov&&cg?'#c0e0ff':cg?col:'#1a2a3a'}
                  strokeWidth={isCur?2:hov&&cg?1.5:1} opacity={s.locked&&!ul?.4:1}/>
                {s.locked&&!ul&&<text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontSize={5} fill="#303040">🔒</text>}
                <text x={x} y={y+13} textAnchor="middle" fontSize={6.5}
                  fill={isCur?'#80d0f0':cg?'#808ea0':'#304050'} fontFamily="monospace">{s.name.length>16?s.name.split(' ').slice(0,2).join(' '):s.name}</text>
                {cg&&!isCur&&cost>0&&<text x={x} y={y+21} textAnchor="middle" fontSize={5.5} fill="#3a5a70" fontFamily="monospace">{cost}cr</text>}
                {hov&&s.locked&&!ul&&(
                  <g>
                    <rect x={Math.min(x-60,W2-122)} y={y+22} width={120} height={18} rx={3} fill="#050d18" stroke="#1a3040"/>
                    <text x={Math.min(x,W2-62)} y={y+31} textAnchor="middle" fontSize={5.5} fill="#5a7a90" fontFamily="monospace">{s.unlockReq?.label?.slice(0,28)}</text>
                  </g>
                )}
              </g>
            )
          })}
        </svg>
      </div>

      <div style={{background:'#030a12',border:'1px solid #1a3040',borderRadius:8,padding:14,marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
          <span style={{color:'#c0d0e0',fontSize:14}}>{SYSTEMS[cur].name}</span>
          <span style={{color:'#4a6a80',fontSize:10}}>{SYSTEMS[cur].faction} · {SYSTEMS[cur].economy}</span>
        </div>
        <p style={{color:'#607080',fontSize:12,margin:'0 0 12px',lineHeight:1.6}}>{SYSTEMS[cur].desc}</p>
        <button onClick={()=>{SFX.click();dispatch({type:'GOTO_STATION',tab:'market'})}}
          style={{width:'100%',padding:'11px',background:'#0a2a4a',border:'1px solid #2a5a8a',color:'#4aafe0',borderRadius:6,cursor:'pointer',fontSize:13,fontFamily:"'Space Mono',monospace",letterSpacing:2}}>
          DOCK AT STATION
        </button>
      </div>

      {Object.values(SYSTEMS).filter(s=>!s.locked&&SYSTEMS[cur].connections.includes(s.id)&&canGo(s.id)).length>0&&(
        <div style={{background:'#030a12',border:'1px solid #1a2a3a',borderRadius:8,padding:12,marginBottom:12,fontSize:11}}>
          <div style={{color:'#3a5a70',marginBottom:8,letterSpacing:2,fontSize:10}}>JUMP DESTINATIONS</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {SYSTEMS[cur].connections.filter(id=>canGo(id)).map(id=>{
              const s=SYSTEMS[id]
              return(
                <button key={id} onClick={()=>handleJump(id)}
                  style={{padding:'5px 10px',background:'#060f1a',border:'1px solid #1a3a5a',color:'#6090b0',borderRadius:4,cursor:'pointer',fontSize:11,fontFamily:"'Space Mono',monospace"}}>
                  {s.name} <span style={{color:'#3a5a70'}}>{travelCost(id,state.engine)}cr</span>
                </button>
              )
            })}
          </div>
        </div>
      )}

      {(state.flags.edda_clue_1||state.flags.edda_clue_2||state.flags.edda_clue_3)&&(
        <div style={{background:'#030a12',border:'1px solid #1a2a1a',borderRadius:8,padding:12,fontSize:11}}>
          <div style={{color:'#4a6a4a',letterSpacing:2,marginBottom:8,fontSize:10}}>INVESTIGATION</div>
          {state.flags.edda_clue_1&&<div style={{color:'#70a070',marginBottom:3}}>🔍 Grex remembers Edda Vance</div>}
          {state.flags.edda_clue_2&&<div style={{color:'#70a070',marginBottom:3}}>🔍 Mara's warning — find Smee at The Sump</div>}
          {state.flags.edda_clue_3&&<div style={{color:'#70a070',marginBottom:3}}>🔍 Data core obtained from Smee</div>}
          {state.flags.consortium_files&&<div style={{color:'#80b080',marginBottom:3}}>📁 Consortium records in hand</div>}
          {state.flags.edda_clue_3&&!state.flags.decryption_complete&&<div style={{color:'#507060',fontSize:10,marginTop:4}}>→ Find Keeper Isha at Kessel Expanse</div>}
          {state.flags.decryption_complete&&!state.flags.truth_revealed&&<div style={{color:'#80d080',marginBottom:3}}>🔓 Core decrypted — Edda is at Cold Harbor</div>}
          {state.flags.truth_revealed&&!state.flags.game_complete&&<div style={{color:'#d0c060'}}>📡 The truth is known. Find Edda at Exodus Point.</div>}
          {state.flags.game_complete&&<div style={{color:'#ffe080',fontSize:13}}>✨ The Long Route — Complete.</div>}
        </div>
      )}
    </div>
  )
}

// ── TRADE LEDGER ───────────────────────────────────────────
function LedgerScreen({state,dispatch}){
  const net=(state.totalProfit||0)-(state.totalLoss||0)
  const trades=state.trades||[]
  const byCom={}
  trades.filter(t=>t.type==='sell').forEach(t=>{
    if(!byCom[t.id])byCom[t.id]={name:t.name,color:t.color,units:0,revenue:0,profit:0,count:0}
    byCom[t.id].units+=t.qty;byCom[t.id].revenue+=t.total;byCom[t.id].profit+=t.profit;byCom[t.id].count++
  })
  const sorted=Object.values(byCom).sort((a,b)=>b.profit-a.profit)
  return(
    <div style={{fontFamily:"'Space Mono',monospace",maxWidth:500,margin:'0 auto',padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{color:'#304050',fontSize:10,letterSpacing:3}}>TRADE LEDGER</div>
        <button onClick={()=>{SFX.click();dispatch({type:'GOTO_MAP'})}} style={{background:'none',border:'1px solid #1a3040',color:'#4a6a80',padding:'4px 12px',borderRadius:4,cursor:'pointer',fontSize:11,fontFamily:"'Space Mono',monospace"}}>BACK</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
        <div style={{background:'#030a12',border:'1px solid #1a3a1a',borderRadius:8,padding:10,textAlign:'center'}}>
          <div style={{color:'#4a6a4a',fontSize:9,marginBottom:3,letterSpacing:1}}>PROFIT</div>
          <div style={{color:'#4ade80',fontSize:13}}>+{state.totalProfit||0}cr</div>
        </div>
        <div style={{background:'#030a12',border:'1px solid #3a1a1a',borderRadius:8,padding:10,textAlign:'center'}}>
          <div style={{color:'#6a4a4a',fontSize:9,marginBottom:3,letterSpacing:1}}>LOSS</div>
          <div style={{color:'#f87171',fontSize:13}}>-{state.totalLoss||0}cr</div>
        </div>
        <div style={{background:'#030a12',border:`1px solid ${net>=0?'#1a3a1a':'#3a1a1a'}`,borderRadius:8,padding:10,textAlign:'center'}}>
          <div style={{color:'#4a6a60',fontSize:9,marginBottom:3,letterSpacing:1}}>NET</div>
          <div style={{color:net>=0?'#4ade80':'#f87171',fontSize:13}}>{net>=0?'+':''}{net}cr</div>
        </div>
      </div>
      {sorted.length>0&&(
        <div style={{background:'#030a12',border:'1px solid #1a3040',borderRadius:8,padding:12,marginBottom:14}}>
          <div style={{color:'#4a6a80',fontSize:9,letterSpacing:2,marginBottom:10}}>BY COMMODITY</div>
          {sorted.map(c=>(
            <div key={c.name} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid #0d1e2a'}}>
              <span style={{color:c.color,fontSize:12,flex:1}}>● {c.name}</span>
              <span style={{color:'#4a6a80',fontSize:10}}>{c.units}u/{c.count}t</span>
              <span style={{color:c.profit>=0?'#4ade80':'#f87171',fontSize:12,minWidth:66,textAlign:'right'}}>{c.profit>=0?'+':''}{c.profit}cr</span>
            </div>
          ))}
        </div>
      )}
      <div style={{background:'#030a12',border:'1px solid #1a3040',borderRadius:8,padding:12}}>
        <div style={{color:'#4a6a80',fontSize:9,letterSpacing:2,marginBottom:10}}>RECENT TRADES</div>
        {trades.length===0&&<div style={{color:'#304050',fontSize:12}}>No trades yet.</div>}
        {trades.map((t,i)=>(
          <div key={i} style={{padding:'7px 0',borderBottom:'1px solid #0a1820'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <span style={{color:t.type==='buy'?'#5090d0':'#d0a050',fontSize:9,background:t.type==='buy'?'#0a1a2a':'#2a1a0a',padding:'1px 6px',borderRadius:3}}>{t.type.toUpperCase()}</span>
                <span style={{color:t.color,fontSize:12}}>{t.name}</span>
              </div>
              <span style={{color:t.type==='sell'?(t.profit>=0?'#4ade80':'#f87171'):'#607080',fontSize:12}}>
                {t.type==='sell'?(t.profit>=0?'+':'')+t.profit+'cr':'-'+t.total+'cr'}
              </span>

            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#3a5a6a'}}>
              <span>{t.qty}× @{t.price}cr{t.type==='sell'?` (cost ${t.buyPrice}, ${t.profitPerUnit>=0?'+':''}${t.profitPerUnit}/u)`:''}</span>

  )

  const repCost = repAmt * 5

    <div>
      <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 16, marginBottom: 12 }}>
        <div style={{ color: '#708090', fontSize: 11, marginBottom: 8, letterSpacing: 1 }}>SHIP STATUS</div>

          <StatBlock label="Hull" val={`${state.hull}/${state.maxHull}`} color={state.hull < 40 ? '#f87171' : '#4ade80'} />
          <StatBlock label="Cargo" val={`${cargoUsed(state.cargo)}/${state.cargoMax}`} color="#a0c0d0" />
          <StatBlock label="Weapons" val={`LV${state.weapons}`} color="#d0a050" />
          <StatBlock label="Shields" val={`LV${state.shields}`} color="#5090d0" />
          <StatBlock label="Engine" val={`LV${state.engine}`} color="#50d0a0" />
          <StatBlock label="System" val={sys.faction} color={sys.faction === 'Combine' ? '#4080c0' : sys.faction === 'Neutral' ? '#808080' : '#a06040'} />
        </div>
        {state.hull < state.maxHull && (
          <div style={{ borderTop: '1px solid #1a3040', paddingTop: 12 }}>
            <div style={{ color: '#607080', fontSize: 11, marginBottom: 8 }}>Hull repair: 5cr/point</div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <input type="range" min={1} max={missing} value={repairAmt} onChange={e => setRepairAmt(Number(e.target.value))}
                style={{ flex: 1, accentColor: '#4ade80' }} />
              <span style={{ color: '#a0c0d0', fontSize: 12, minWidth: 60 }}>{repAmt} pts</span>
              <button onClick={() => dispatch({ type: 'REPAIR', amt: repAmt })}
                style={{ padding: '6px 12px', background: '#0a2a0a', border: '1px solid #2a5a2a', color: '#4ade80', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontFamily: 'Space Mono, monospace' }}>
                {repCost}cr
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Cargo manifest */}
      {state.cargo.length > 0 && (
        <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 16 }}>
          <div style={{ color: '#708090', fontSize: 11, marginBottom: 8, letterSpacing: 1 }}>CARGO MANIFEST</div>
          {state.cargo.map(c => {
            const mktPrice = state.markets[state.currentSystem]?.[c.id]?.price || 0
            const profit = (mktPrice - c.buyPrice) * c.qty
            return (
              <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid #0d1e2a' }}>
                <span style={{ color: c.color, fontSize: 12 }}>● {c.name}</span>
                <span style={{ color: '#607080', fontSize: 11 }}>{c.qty}x @ {c.buyPrice}cr</span>
                <span style={{ color: profit >= 0 ? '#4ade80' : '#f87171', fontSize: 11 }}>{profit >= 0 ? '+' : ''}{profit}cr</span>
              </div>
            )
          })}
        </div>
      )}
    </div>
  )
}

function StatBlock({ label, val, color }) {
  return (
    <div style={{ background: '#060f18', border: '1px solid #1a2a3a', borderRadius: 6, padding: '8px 10px' }}>
      <div style={{ color: '#4a6a80', fontSize: 10, letterSpacing: 1 }}>{label}</div>
      <div style={{ color: color || '#a0c0d0', fontSize: 14, marginTop: 2 }}>{val}</div>
    </div>
  )
}

function MarketTab({ state, dispatch, sys }) {
  const [qty, setQty] = useState({})
  const market = state.markets[state.currentSystem] || {}

  return (
    <div>
      {COMMODITIES.filter(c => !(!sys.hasBlackMarket && c.id === 'contraband')).map(c => {
        const mkt = market[c.id] || { price: c.base, qty: 0 }
        const cargoItem = state.cargo.find(x => x.id === c.id)
        const cargoQty = cargoItem?.qty || 0
        const q = qty[c.id] || 1
        const isCheap = sys.cheap?.includes(c.id)
        const isExpensive = sys.expensive?.includes(c.id)

        return (
          <div key={c.id} style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 12, marginBottom: 8 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
              <div>
                <span style={{ color: c.color, fontSize: 13 }}>● {c.name}</span>
                {isCheap && <span style={{ color: '#4ade80', fontSize: 9, marginLeft: 8 }}>▼CHEAP</span>}
                {isExpensive && <span style={{ color: '#f87171', fontSize: 9, marginLeft: 8 }}>▲HIGH</span>}
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ color: '#c0d0e0', fontSize: 14 }}>{mkt.price}cr</div>
                <div style={{ color: '#4a6a80', fontSize: 10 }}>avail: {mkt.qty}</div>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <button onClick={() => setQty(q2 => ({ ...q2, [c.id]: Math.max(1, (q2[c.id] || 1) - 1) }))}
                style={{ width: 28, height: 28, background: '#0a1520', border: '1px solid #1a3040', color: '#a0c0d0', borderRadius: 4, cursor: 'pointer', fontSize: 14 }}>−</button>
              <span style={{ color: '#a0c0d0', fontSize: 13, minWidth: 20, textAlign: 'center' }}>{q}</span>
              <button onClick={() => setQty(q2 => ({ ...q2, [c.id]: (q2[c.id] || 1) + 1 }))}
                style={{ width: 28, height: 28, background: '#0a1520', border: '1px solid #1a3040', color: '#a0c0d0', borderRadius: 4, cursor: 'pointer', fontSize: 14 }}>+</button>
              <button onClick={() => mkt.qty >= q && SFX.buy(); dispatch({ type: 'BUY', id: c.id, qty: q })}
                disabled={mkt.qty < q || state.credits < mkt.price * q}
                style={{ flex: 1, padding: '6px', background: '#0a2a0a', border: '1px solid #1a5a1a', color: '#4ade80', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontFamily: 'Space Mono, monospace', opacity: (mkt.qty < q || state.credits < mkt.price * q) ? 0.4 : 1 }}>
                BUY {mkt.price * q}cr
              </button>
              {cargoQty > 0 && (
                <button onClick={() => SFX.sell(); dispatch({ type: 'SELL', id: c.id, qty: Math.min(q, cargoQty) })}
                  style={{ flex: 1, padding: '6px', background: '#2a1a0a', border: '1px solid #5a3a1a', color: '#d0a050', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontFamily: 'Space Mono, monospace' }}>
                  SELL ({cargoQty})
                </button>
              )}
            </div>
          </div>
        )
      })}
    </div>
  )
}

function BarTab({ state, dispatch, sys }) {
  const npcs = (sys.npcs || []).map(id => NPCS_DATA[id]).filter(Boolean)
  if (npcs.length === 0) return <div style={{ color: '#4a6a80', textAlign: 'center', padding: 40 }}>The bar is empty.<br /><span style={{ fontSize: 11 }}>Even the barkeep looks surprised.</span></div>
  return (
    <div>
      {npcs.map(npc => (
        <button key={npc.id} onClick={() => dispatch({ type: 'START_DIALOGUE', npcId: npc.id })}
          style={{ width: '100%', background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 12, marginBottom: 10, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 14, textAlign: 'left' }}>
          <Portrait id={npc.portrait} size={56} />
          <div>
            <div style={{ color: '#c0d0e0', fontSize: 14, marginBottom: 2 }}>{npc.name}</div>
            <div style={{ color: '#4a6a80', fontSize: 11 }}>{npc.title}</div>
            <div style={{ color: '#607080', fontSize: 11, marginTop: 4, fontStyle: 'italic' }}>{npc.greeting}</div>
          </div>
        </button>
      ))}
    </div>
  )
}

function ShipyardTab({ state, dispatch }) {
  return (
    <div>
      <div style={{ color: '#607080', fontSize: 12, marginBottom: 16, lineHeight: 1.5 }}>
        The Persistent Delusion is functional. It could be more functional.
      </div>
      {UPGRADES.map(upg => {
        const owned = state.upgrades.includes(upg.id)
        const reqOwned = !upg.req || state.upgrades.includes(upg.req)
        const canAfford = state.credits >= upg.cost
        return (
          <div key={upg.id} style={{ background: '#030a12', border: `1px solid ${owned ? '#1a4a2a' : '#1a3040'}`, borderRadius: 8, padding: 12, marginBottom: 8, opacity: !reqOwned ? 0.5 : 1 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
              <div>
                <span style={{ color: owned ? '#4ade80' : '#a0c0d0', fontSize: 13 }}>{owned ? '✓ ' : ''}{upg.name}</span>
                <div style={{ color: '#506080', fontSize: 11, marginTop: 3 }}>{upg.desc}</div>
                {upg.req && !state.upgrades.includes(upg.req) && (
                  <div style={{ color: '#6a4a4a', fontSize: 10, marginTop: 3 }}>Requires: {UPGRADES.find(u => u.id === upg.req)?.name}</div>
                )}
              </div>
              <span style={{ color: owned ? '#4ade80' : canAfford ? '#c0d0e0' : '#f87171', fontSize: 13, marginLeft: 12, whiteSpace: 'nowrap' }}>{owned ? 'OWNED' : `${upg.cost}cr`}</span>
            </div>
            {!owned && reqOwned && (
              <button onClick={() => SFX.upgrade(); dispatch({ type: 'BUY_UPGRADE', id: upg.id })}
                disabled={!canAfford}
                style={{ width: '100%', padding: '8px', background: canAfford ? '#0a2a4a' : '#050d18', border: `1px solid ${canAfford ? '#2a5a8a' : '#1a2a3a'}`, color: canAfford ? '#4aafe0' : '#3a5a70', borderRadius: 4, cursor: canAfford ? 'pointer' : 'default', fontSize: 11, fontFamily: 'Space Mono, monospace' }}>
                INSTALL
              </button>
            )}
          </div>
        )
      })}
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// DIALOGUE
// ═══════════════════════════════════════════════════════════

function DialogueScreen({ state, dispatch }) {
  const { npcId, nodeId } = state.dialogue
  const npc = NPCS_DATA[npcId]
  if (!npc) return null
  const node = npc.tree[nodeId]
  if (!node) return null

  const text = node.text.replace('{name}', state.playerName)

  return (
    <div style={{ fontFamily: 'Space Mono, monospace', maxWidth: 520, margin: '0 auto', padding: '16px' }}>
      {/* NPC Header */}
      <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 16, marginBottom: 12, display: 'flex', gap: 16, alignItems: 'flex-start' }}>
        <Portrait id={npc.portrait} size={80} />
        <div>
          <div style={{ color: '#c0e0f0', fontSize: 16, marginBottom: 2 }}>{npc.name}</div>
          <div style={{ color: '#4a6a80', fontSize: 11, marginBottom: 12 }}>{npc.title}</div>
          <div style={{ color: '#304050', fontSize: 11 }}>◦ ◦ ◦</div>
        </div>
      </div>

      {/* Dialogue text */}
      <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 16, marginBottom: 12 }}>
        <div style={{ color: '#a0b8c0', fontSize: 13, lineHeight: 1.8, whiteSpace: 'pre-line' }}>{text}</div>
      </div>

      {/* Options */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {node.options.map((opt, i) => {
          // Check if option is locked due to flag requirements
          if (opt.requireFlag && !state.flags[opt.requireFlag]) return null
          const hasCargoReq = opt.requireCargo && (() => {
            const c = state.cargo.find(x => x.id === opt.requireCargo)
            return !c || c.qty < opt.requireQty
          })()
          return (
            <button key={i} onClick={() => !hasCargoReq && SFX.click(); dispatch({ type: 'CHOOSE_OPTION', option: opt })}
              style={{
                padding: '12px 16px', background: hasCargoReq ? '#050d18' : '#060f1a',
                border: `1px solid ${hasCargoReq ? '#1a2030' : opt.flag ? '#2a4a2a' : '#1a3040'}`,
                color: hasCargoReq ? '#304050' : opt.flag ? '#70a070' : '#8090a0',
                borderRadius: 6, cursor: hasCargoReq ? 'default' : 'pointer',
                fontSize: 12, fontFamily: 'Space Mono, monospace', textAlign: 'left', lineHeight: 1.4
              }}>
              <span style={{ color: hasCargoReq ? '#303040' : opt.flag ? '#4a8a4a' : '#2a5a8a' }}>▶ </span>
              {opt.text}
              {opt.flagLabel && <span style={{ display: 'block', fontSize: 10, color: '#4a6a4a', marginTop: 4 }}>{opt.flagLabel}</span>}
              {hasCargoReq && <span style={{ display: 'block', fontSize: 10, color: '#6a3a3a', marginTop: 2 }}>Requires {opt.requireQty} {opt.requireCargo}</span>}
            </button>
          )
        })}
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// COMBAT
// ═══════════════════════════════════════════════════════════

function CombatScreen({ state, dispatch }) {
  if (!state.combat) return null
  const { enemy, playerAP, playerEvading, turn } = state.combat
  const { current: enemyAct, next: enemyNext } = getEnemyAction(enemy, enemy.patternIdx)

  const hullPct = (state.hull / state.maxHull) * 100
  const enemyPct = (enemy.hull / enemy.maxHull) * 100

  return (
    <div style={{ fontFamily: 'Space Mono, monospace', maxWidth: 520, margin: '0 auto', padding: '16px' }}>
      <div style={{ color: '#304050', fontSize: 10, letterSpacing: 3, marginBottom: 8 }}>COMBAT — TURN {turn}</div>

      {/* Enemy */}
      <div style={{ background: '#0a0505', border: '1px solid #3a1010', borderRadius: 8, padding: 14, marginBottom: 10 }}>
        <div style={{ display: 'flex', gap: 14, alignItems: 'center', marginBottom: 10 }}>
          <Portrait id={enemy.id} size={64} />
          <div style={{ flex: 1 }}>
            <div style={{ color: '#e0c0a0', fontSize: 14 }}>{enemy.name}</div>
            <div style={{ color: '#705040', fontSize: 11, marginBottom: 8 }}>Hull: {enemy.hull}/{enemy.maxHull}</div>
            <div style={{ height: 6, background: '#200a0a', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${enemyPct}%`, background: '#a04030', borderRadius: 3, transition: 'width 0.3s' }} />
            </div>
          </div>
        </div>
        <div style={{ background: '#0d0808', border: '1px solid #2a1010', borderRadius: 6, padding: 10 }}>
          <div style={{ color: '#604040', fontSize: 10, marginBottom: 4, letterSpacing: 1 }}>ENEMY INTENT</div>
          <div style={{ color: '#d08060', fontSize: 13 }}>NOW: {formatIntent(enemyAct, enemy.damage)}</div>
          <div style={{ color: '#5a3a2a', fontSize: 11, marginTop: 4 }}>NEXT: {formatIntent(enemyNext, enemy.damage)}</div>
        </div>
      </div>

      {/* Combat log */}
      <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 10, marginBottom: 10, maxHeight: 100, overflowY: 'auto' }}>
        {state.combatLog.map((l, i) => (
          <div key={i} style={{ color: i === 0 ? '#a0c0d0' : '#3a5a6a', fontSize: 11, marginBottom: 2, lineHeight: 1.4 }}>{l}</div>
        ))}
      </div>

      {/* Player status */}
      <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 12, marginBottom: 12 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
          <span style={{ color: '#4a8a8a', fontSize: 12 }}>Persistent Delusion</span>
          <span style={{ color: hullPct < 30 ? '#f87171' : '#4ade80', fontSize: 12 }}>Hull: {state.hull}/{state.maxHull}</span>
        </div>
        <div style={{ height: 6, background: '#0a1520', borderRadius: 3, overflow: 'hidden', marginBottom: 8 }}>
          <div style={{ height: '100%', width: `${hullPct}%`, background: hullPct < 30 ? '#f87171' : '#4ade80', borderRadius: 3, transition: 'width 0.3s' }} />
        </div>
        <div style={{ display: 'flex', gap: 12 }}>
          <span style={{ color: '#4a6a80', fontSize: 11 }}>AP: {[...Array(3)].map((_, i) => <span key={i} style={{ color: i < playerAP ? '#4aaad0' : '#1a2a3a' }}>◆</span>)}</span>
          {playerEvading && <span style={{ color: '#5090d0', fontSize: 11 }}>🛡 EVADING</span>}
        </div>
      </div>

      {/* Actions */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
        <CombatBtn label="FIRE (1 AP)" sub={`~${playerFireDamage(state.weapons) - 3}–${playerFireDamage(state.weapons) + 3} dmg`} color="#d07050" disabled={playerAP < 1} onClick={() => { SFX.fire(); dispatch({ type: 'COMBAT_ACTION', act: 'fire' }) }} />
        <CombatBtn label="OVERLOAD (2 AP)" sub="Double damage" color="#d0a050" disabled={playerAP < 2} onClick={() => { SFX.fire(); dispatch({ type: 'COMBAT_ACTION', act: 'overload' }) }} />
        <CombatBtn label="EVADE (1 AP)" sub="Half incoming dmg" color="#5090d0" disabled={playerAP < 1} onClick={() => { SFX.click(); dispatch({ type: 'COMBAT_ACTION', act: 'evade' }) }} />
        <CombatBtn label="REPAIR (2 AP)" sub={`+${playerRepairAmount(state.shields)} hull`} color="#4ade80" disabled={playerAP < 2} onClick={() => { SFX.buy(); dispatch({ type: 'COMBAT_ACTION', act: 'repair' }) }} />
      </div>
      <CombatBtn label="END TURN →" sub="Enemy acts, AP refills" color="#a0a0d0" disabled={false} onClick={() => { SFX.click(); dispatch({ type: 'COMBAT_ACTION', act: 'end_turn' }) }} full />
    </div>
  )
}

function CombatBtn({ label, sub, color, disabled, onClick, full }) {
  return (
    <button onClick={!disabled ? onClick : undefined}
      style={{ gridColumn: full ? '1 / -1' : undefined, padding: '10px', background: disabled ? '#050d18' : '#060f1a', border: `1px solid ${disabled ? '#1a2030' : '#2a3a4a'}`, color: disabled ? '#304050' : color, borderRadius: 6, cursor: disabled ? 'default' : 'pointer', fontFamily: 'Space Mono, monospace', textAlign: 'left', opacity: disabled ? 0.5 : 1 }}>
      <div style={{ fontSize: 11 }}>{label}</div>
      <div style={{ fontSize: 10, opacity: 0.7 }}>{sub}</div>
    </button>
  )
}

// ═══════════════════════════════════════════════════════════
// EVENT
// ═══════════════════════════════════════════════════════════

function EventScreen({ state, dispatch }) {
  if (!state.event) return null
  const ev = state.event
  return (
    <div style={{ fontFamily: 'Space Mono, monospace', maxWidth: 520, margin: '0 auto', padding: 24 }}>
      <div style={{ color: '#4a6a80', fontSize: 10, letterSpacing: 3, marginBottom: 16 }}>HYPERSPACE EVENT</div>
      <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 20, marginBottom: 16 }}>
        <p style={{ color: '#a0b8c0', fontSize: 14, lineHeight: 1.8, margin: 0 }}>{ev.text}</p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {ev.options.map((opt, i) => {
          const cantAfford = opt.type === 'pay_repair' && state.credits < opt.value
          const noCargo = opt.type === 'info_trade' && (() => { const c = state.cargo.find(x => x.id === opt.need); return !c || c.qty < opt.qty })()
          const disabled = cantAfford || noCargo
          return (
            <button key={i} onClick={() => !disabled && dispatch({ type: 'RESOLVE_EVENT', option: opt })}
              style={{ padding: '14px 16px', background: disabled ? '#050d18' : '#060f1a', border: '1px solid #1a3040', color: disabled ? '#304050' : '#8090a0', borderRadius: 6, cursor: disabled ? 'default' : 'pointer', fontSize: 12, fontFamily: 'Space Mono, monospace', textAlign: 'left', lineHeight: 1.4, opacity: disabled ? 0.5 : 1 }}>
              <span style={{ color: '#2a5a8a' }}>▶ </span>{opt.text}
              {cantAfford && <span style={{ display: 'block', fontSize: 10, color: '#6a3a3a', marginTop: 2 }}>Can't afford this</span>}
              {noCargo && <span style={{ display: 'block', fontSize: 10, color: '#6a3a3a', marginTop: 2 }}>Not enough {opt.need} in cargo</span>}
            </button>
          )
        })}
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// LOG SCREEN
// ═══════════════════════════════════════════════════════════

function LogScreen({ state, dispatch }) {
  return (
    <div style={{ fontFamily: 'Space Mono, monospace', maxWidth: 520, margin: '0 auto', padding: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <div style={{ color: '#304050', fontSize: 11, letterSpacing: 3 }}>CAPTAIN'S LOG</div>
        <button onClick={() => dispatch({ type: 'GOTO_MAP' })} style={{ background: 'none', border: '1px solid #1a3040', color: '#4a6a80', padding: '4px 12px', borderRadius: 4, cursor: 'pointer', fontSize: 11, fontFamily: 'Space Mono, monospace' }}>BACK</button>
      </div>
      <div style={{ background: '#030a12', border: '1px solid #1a3040', borderRadius: 8, padding: 16 }}>
        {state.gameLog.map((entry, i) => (
          <div key={i} style={{ color: i === 0 ? '#a0b8c0' : `hsl(200, 20%, ${Math.max(25, 55 - i * 1.5)}%)`, fontSize: 12, marginBottom: 8, lineHeight: 1.6, borderLeft: i === 0 ? '2px solid #2a5a8a' : '2px solid #1a2a3a', paddingLeft: 10 }}>
            {entry}
          </div>
        ))}
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════
// MAIN GAME
// ═══════════════════════════════════════════════════════════

function LongRoute() {
  const [state, dispatch] = useReducer(reducer, null, makeInitialState)

  const wrappedDispatch = useCallback((action) => {
    dispatch(action)
  }, [])

  // Auto-clear notification
  useEffect(() => {
    if (state.notification) {
      const t = setTimeout(() => dispatch({ type: 'CLEAR_NOTIFY' }), 3000)
      return () => clearTimeout(t)
    }
  }, [state.notification])

  return (
    <div style={{ minHeight: '100vh', background: '#010a14', color: '#a0c0d0' }}>
      {/* Notification */}
      {state.notification && (
        <div style={{ position: 'fixed', top: 50, left: '50%', transform: 'translateX(-50%)', background: '#0a1a2a', border: '1px solid #2a5a8a', color: '#80c0e0', padding: '10px 20px', borderRadius: 8, fontSize: 12, fontFamily: 'Space Mono, monospace', zIndex: 200, maxWidth: '90vw', textAlign: 'center', boxShadow: '0 4px 20px rgba(0,30,60,0.8)' }}>
          {state.notification}
        </div>
      )}

      {state.view === 'nameEntry' ? (
        <NameEntry dispatch={wrappedDispatch} />
      ) : (
        <>
          <HUD state={state} dispatch={wrappedDispatch} />
          <div style={{ paddingBottom: 24 }}>
            {state.view === 'map'      && <GalaxyMap state={state} dispatch={wrappedDispatch} />}
            {state.view === 'station'  && <StationView state={state} dispatch={wrappedDispatch} />}
            {state.view === 'dialogue' && <DialogueScreen state={state} dispatch={wrappedDispatch} />}
            {state.view === 'combat'   && <CombatScreen state={state} dispatch={wrappedDispatch} />}
            {state.view === 'event'    && <EventScreen state={state} dispatch={wrappedDispatch} />}
            {state.view === 'log'      && <LogScreen state={state} dispatch={wrappedDispatch} />}
            {state.view === 'ledger'   && <LedgerScreen state={state} dispatch={wrappedDispatch} />}
          </div>
        </>
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(LongRoute))
</script>
<script>if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}</script>
